apiVersion: v1
kind: ConfigMap
metadata:
  name: settla-node-config
  labels:
    app.kubernetes.io/name: settla-node
    app.kubernetes.io/component: worker
data:
  # Total partitions (must match across all nodes)
  SETTLA_NODE_PARTITIONS: "8"

  # Database URLs (via PgBouncer)
  SETTLA_LEDGER_DB_URL: "postgres://settla:$(POSTGRES_PASSWORD)@pgbouncer-ledger:6432/settla_ledger?sslmode=require"
  SETTLA_TRANSFER_DB_URL: "postgres://settla:$(POSTGRES_PASSWORD)@pgbouncer-transfer:6432/settla_transfer?sslmode=require"
  SETTLA_TREASURY_DB_URL: "postgres://settla:$(POSTGRES_PASSWORD)@pgbouncer-treasury:6432/settla_treasury?sslmode=require"

  # TigerBeetle
  SETTLA_TIGERBEETLE_ADDRESSES: "tigerbeetle:3001"

  # Redis
  SETTLA_REDIS_URL: "redis://:$(REDIS_PASSWORD)@redis:6379"

  # NATS
  SETTLA_NATS_URL: "nats://nats:4222"

  # Provider mode
  SETTLA_PROVIDER_MODE: "live"

  # Logging
  SETTLA_LOG_LEVEL: "info"
