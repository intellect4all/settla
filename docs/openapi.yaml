      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - currency
              - expected_amount
              properties:
                currency:
                  type: string
                  pattern: ^[A-Z]{3,5}$
                  description: Fiat currency code.
                  example: GBP
                banking_partner_id:
                  type: string
                  description: Preferred banking partner ID. Auto-selected if omitted.
                account_type:
                  type: string
                  enum:
                  - PERMANENT
                  - TEMPORARY
                  description: Virtual account type. TEMPORARY accounts expire with the session.
                  example: TEMPORARY
                expected_amount:
                  type: string
                  description: Expected deposit amount. Decimal string.
                  example: '25000.00'
                min_amount:
                  type: string
                  description: Minimum acceptable amount. Decimal string.
                max_amount:
                  type: string
                  description: Maximum acceptable amount. Decimal string.
                mismatch_policy:
                  type: string
                  enum:
                  - ACCEPT
                  - REJECT
                  description: Policy when received amount differs from expected. ACCEPT credits the received amount; REJECT
                    returns it.
                  example: ACCEPT
                settlement_pref:
                  type: string
                  enum:
                  - AUTO_CONVERT
                  - HOLD
                  - THRESHOLD
                  description: Settlement preference for the deposited funds.
                idempotency_key:
