  /v1/deposits:
    post:
      operationId: createDepositSession
      summary: Create a crypto deposit session
      description: Creates a new crypto deposit session. A unique deposit address is generated for the specified chain and
        token. The session monitors the blockchain for incoming payments and progresses through the deposit lifecycle.
      tags:
      - Crypto Deposits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - chain
              - token
              - expected_amount
              properties:
                chain:
                  type: string
                  enum:
                  - tron
                  - ethereum
                  - solana
                  - base
                  - polygon
                  - arbitrum
                  description: Blockchain network.
                  example: tron
                token:
                  type: string
                  description: Token symbol (e.g. USDT, USDC).
                  example: USDT
                expected_amount:
                  type: string
                  description: Expected deposit amount. Decimal string.
                  example: '5000.00'
                currency:
                  type: string
                  description: Target fiat currency for auto-conversion (required if settlement_pref is AUTO_CONVERT).
                  example: NGN
                settlement_pref:
                  type: string
                  enum:
                  - AUTO_CONVERT
                  - HOLD
                  - THRESHOLD
                  description: Settlement preference. AUTO_CONVERT converts to fiat immediately. HOLD keeps as stablecoin.
                    THRESHOLD converts when a threshold is met.
                  example: AUTO_CONVERT
                idempotency_key:
                  type: string
                  description: Idempotency key for deduplication.
                  example: dep_20240315_001
                ttl_seconds:
                  type: integer
                  description: Session time-to-live in seconds. Default varies by chain.
                  example: 3600
      responses:
        '201':
          description: Deposit session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepositSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
