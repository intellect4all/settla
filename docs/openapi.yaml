                    items:
                      type: object
                      properties:
                        source_currency:
                          type: string
                          example: GBP
                        dest_currency:
                          type: string
                          example: NGN
                        count:
                          type: integer
                          example: 15420
                        volume_usd:
                          type: string
                          example: '8750000.00'
                  statuses:
                    type: object
                    description: Transfer count by status.
                    additionalProperties:
                      type: integer
                    example:
                      COMPLETED: 14800
                      FAILED: 120
                      ON_RAMPING: 45
                      SETTLING: 30
                  total_count:
                    type: integer
                    example: 15420
                  total_volume_usd:
                    type: string
                    example: '8750000.00'
                  total_fees_usd:
                    type: string
                    example: '35000.00'
                  p50_ms:
                    type: integer
                    description: Median transfer completion time in milliseconds.
                    example: 45000
                  p90_ms:
                    type: integer
                    example: 120000
                  p95_ms:
                    type: integer
                    example: 180000
                  p99_ms:
                    type: integer
                    example: 300000
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/analytics/fees:
