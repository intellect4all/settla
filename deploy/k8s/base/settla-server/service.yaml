apiVersion: v1
kind: Service
metadata:
  name: settla-server
  labels:
    app.kubernetes.io/name: settla-server
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: settla-server
  ports:
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
