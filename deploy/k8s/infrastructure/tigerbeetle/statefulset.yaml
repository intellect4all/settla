# Base (development/staging): single-node TigerBeetle.
# Production overlay (overlays/production/tigerbeetle-patch.yaml) scales this
# to 3 replicas with full cluster membership and an init-container format step.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tigerbeetle
  namespace: settla
  labels:
    app.kubernetes.io/name: tigerbeetle
    app.kubernetes.io/component: ledger-engine
    app.kubernetes.io/part-of: settla
spec:
  replicas: 1
  serviceName: tigerbeetle
  selector:
    matchLabels:
      app.kubernetes.io/name: tigerbeetle
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tigerbeetle
        app.kubernetes.io/component: ledger-engine
        app.kubernetes.io/part-of: settla
    spec:
      terminationGracePeriodSeconds: 30
      # Init container: format the data file on first run (single-node, replica 0).
      initContainers:
        - name: tigerbeetle-format
          image: ghcr.io/tigerbeetle/tigerbeetle:0.16.44
          command:
            - sh
            - -c
            - |
              set -e
              DATA_FILE="/data/0_0.tigerbeetle"
              if [ ! -f "${DATA_FILE}" ]; then
                echo "Formatting single-node TigerBeetle data file..."
                /tigerbeetle format \
                  --cluster=0 \
                  --replica=0 \
                  --replica-count=1 \
                  "${DATA_FILE}"
                echo "Format complete."
              else
                echo "Data file already exists — skipping format."
              fi
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      containers:
        - name: tigerbeetle
          image: ghcr.io/tigerbeetle/tigerbeetle:0.16.44
          args:
            - "start"
            - "--addresses=0.0.0.0:3001"
            - "/data/0_0.tigerbeetle"
          ports:
            - containerPort: 3001
              name: tb
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 100Gi
