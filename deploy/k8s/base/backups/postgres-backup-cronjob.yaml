apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: settla
  labels:
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: settla
  annotations:
    # Schedule: daily at 02:00 UTC — matches docs/disaster-recovery.md backup strategy.
    # Backs up all three PostgreSQL databases (ledger, transfer, treasury) sequentially
    # using pg_dump --format=custom, gzip-compresses, and uploads to S3.
    # Retention: 30 days (POSTGRES_RETENTION_DAYS in backup-config ConfigMap).
    settla.io/backup-type: "postgresql-full"
    settla.io/retention: "30d"
    settla.io/rpo: "24h"
spec:
  # Daily at 02:00 UTC — low-traffic window, avoids overlap with settlement batches.
  schedule: "0 2 * * *"

  # Keep the last 3 successful runs and 1 failed run for debugging.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  # If a job is still running when the next schedule fires (e.g., very large DB),
  # skip the new job rather than stacking.
  concurrencyPolicy: Forbid

  # Allow 4 hours before the job is considered a missed schedule (handles brief
  # cluster downtime around the window).
  startingDeadlineSeconds: 14400

  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-backup
        app.kubernetes.io/component: backup
        app.kubernetes.io/part-of: settla
    spec:
      # Retry once on failure before marking the job as failed.
      backoffLimit: 1

      # Kill the job if it runs longer than 3 hours (large dump + upload).
      activeDeadlineSeconds: 10800

      # Clean up finished job pods after 24h.
      ttlSecondsAfterFinished: 86400

      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-backup
            app.kubernetes.io/component: backup
            app.kubernetes.io/part-of: settla
          annotations:
            # Prevent Prometheus from scraping this short-lived pod.
            prometheus.io/scrape: "false"
        spec:
          restartPolicy: OnFailure
          serviceAccountName: settla-backup

          # Node affinity: prefer nodes NOT running TigerBeetle or settla-server
          # to avoid competing for I/O during the backup window.
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 50
                  preference:
                    matchExpressions:
                      - key: settla.io/role
                        operator: In
                        values: ["worker"]

          # Security context — run as non-root.
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            seccompProfile:
              type: RuntimeDefault

          volumes:
            - name: backup-scripts
              configMap:
                name: backup-scripts
                defaultMode: 0755
            - name: tmp
              emptyDir:
                sizeLimit: "20Gi"  # headroom for three compressed dumps

          containers:
            - name: postgres-backup
              # Image contains: aws-cli v2, postgresql-client 16, gzip, curl.
              # Build from deploy/k8s/base/backups/Dockerfile.backup or use
              # the public image below as a reference.
              image: ghcr.io/intellect4all/settla-backup-tools:latest
              imagePullPolicy: IfNotPresent

              command: ["/bin/bash", "/scripts/postgres-backup.sh"]

              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "4Gi"   # pg_dump can buffer large schemas in memory

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]

              volumeMounts:
                - name: backup-scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp

              env:
                # --- Config (non-sensitive) ---
                - name: ENVIRONMENT
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: ENVIRONMENT
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: S3_BUCKET
                - name: S3_PREFIX
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: POSTGRES_S3_PREFIX
                - name: RETENTION_DAYS
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: POSTGRES_RETENTION_DAYS

                # --- Secrets ---
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: POSTGRES_PASSWORD
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: SLACK_WEBHOOK_URL
                      optional: true
                - name: PAGERDUTY_ROUTING_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: PAGERDUTY_ROUTING_KEY
                      optional: true

                # --- AWS (IRSA — no access key/secret needed when IRSA annotation set) ---
                - name: AWS_REGION
                  value: "us-east-1"
                - name: AWS_DEFAULT_REGION
                  value: "us-east-1"

              # Liveness not applicable to batch jobs; just ensure the container
              # exits non-zero on error so backoffLimit triggers a retry.
