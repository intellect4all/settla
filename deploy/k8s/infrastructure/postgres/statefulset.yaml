# Three separate PostgreSQL StatefulSets — one per bounded context.
# Each supports streaming replication: ordinal 0 is primary, ordinals 1+ are replicas.
# Base config: 1 replica (dev). Production overlay scales to 3 replicas.
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-ledger
  namespace: settla
  labels:
    app.kubernetes.io/name: postgres-ledger
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: settla
spec:
  replicas: 1
  serviceName: postgres-ledger
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-ledger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-ledger
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: settla
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: setup-replication
          image: postgres:16-alpine
          command: ["bash", "/scripts/setup-replication.sh"]
          env:
            - name: POSTGRES_DB
              value: settla_ledger
            - name: POSTGRES_USER
              value: settla
            - name: POSTGRES_PASSWORD
              value: settla
            - name: REPLICATION_PASSWORD
              value: settla_repl
            - name: PG_PRIMARY_HOST
              value: postgres-ledger-0.postgres-ledger.settla.svc.cluster.local
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: replication-scripts
              mountPath: /scripts
            - name: replication-config
              mountPath: /replication-config
      containers:
        - name: postgres
          image: postgres:16-alpine
          args:
            - "-c"
            - "config_file=/var/lib/postgresql/data/pgdata/postgresql.conf"
            - "-c"
            - "hba_file=/var/lib/postgresql/data/pgdata/pg_hba.conf"
          ports:
            - containerPort: 5432
              name: postgres
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          env:
            - name: POSTGRES_DB
              value: settla_ledger
            - name: POSTGRES_USER
              value: settla
            # NOTE: In production, use a Secret for the password.
            - name: POSTGRES_PASSWORD
              value: settla
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: REPLICATION_PASSWORD
              value: settla_repl
            - name: PG_PRIMARY_HOST
              value: postgres-ledger-0.postgres-ledger.settla.svc.cluster.local
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: replication-scripts
              mountPath: /scripts
              readOnly: true
            - name: replication-config
              mountPath: /replication-config
              readOnly: true
            - name: docker-entrypoint-initdb
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["bash", "/scripts/readiness-check.sh"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "settla", "-d", "settla_ledger"]
            initialDelaySeconds: 15
            periodSeconds: 10
          lifecycle:
            postStart:
              exec:
                command:
                  - bash
                  - -c
                  - |
                    # Append replication config to postgresql.conf and pg_hba.conf if not already done
                    PGDATA="${PGDATA:-/var/lib/postgresql/data/pgdata}"
                    if [ -f "${PGDATA}/postgresql.conf" ] && ! grep -q "wal_level" "${PGDATA}/postgresql.conf" 2>/dev/null; then
                      cat /replication-config/postgresql-replication.conf >> "${PGDATA}/postgresql.conf"
                    fi
                    if [ -f "${PGDATA}/pg_hba.conf" ] && ! grep -q "replicator" "${PGDATA}/pg_hba.conf" 2>/dev/null; then
                      cat /replication-config/pg_hba_replication.conf >> "${PGDATA}/pg_hba.conf"
                    fi
                    # Reload config
                    pg_ctl reload -D "${PGDATA}" 2>/dev/null || true
      volumes:
        - name: replication-scripts
          configMap:
            name: postgres-replication-config
            defaultMode: 0755
            items:
              - key: setup-replication.sh
                path: setup-replication.sh
              - key: readiness-check.sh
                path: readiness-check.sh
        - name: replication-config
          configMap:
            name: postgres-replication-config
            items:
              - key: postgresql-replication.conf
                path: postgresql-replication.conf
              - key: pg_hba_replication.conf
                path: pg_hba_replication.conf
        - name: docker-entrypoint-initdb
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 200Gi
