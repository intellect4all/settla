# ExternalSecret — alertmanager notification secrets
#
# Maps AWS Secrets Manager path `settla/production/alertmanager` → K8s Secret
# `alertmanager-secrets` (consumed by deploy/k8s/base/alertmanager/deployment.yaml).
#
# AWS Secrets Manager path to create:
#   Name:    settla/production/alertmanager
#   Type:    Other (plain JSON)
#   Value:
#     {
#       "slack-webhook-url": "https://hooks.slack.com/services/<WORKSPACE>/<CHANNEL>/<TOKEN>",
#       "pagerduty-service-key": "<PagerDuty-Events-API-v2-integration-key>",
#       "remediation-webhook-token": "<random-string-min-32-chars>"
#     }
#
# How to create in AWS CLI:
#   aws secretsmanager create-secret \
#     --name settla/production/alertmanager \
#     --region eu-west-1 \
#     --secret-string '{
#       "slack-webhook-url": "CHANGE_ME",
#       "pagerduty-service-key": "CHANGE_ME",
#       "remediation-webhook-token": "CHANGE_ME"
#     }'
#
# Consumed by:
#   - deploy/k8s/base/alertmanager/deployment.yaml  (env: SLACK_WEBHOOK_URL,
#     PAGERDUTY_SERVICE_KEY, REMEDIATION_WEBHOOK_TOKEN)
#   - deploy/k8s/base/alertmanager/configmap.yaml   (interpolated via env var)
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-secrets
  labels:
    app.kubernetes.io/name: alertmanager-secrets
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: settla
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: settla-aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-secrets
    creationPolicy: Owner
    immutable: false
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: alertmanager-secrets
          app.kubernetes.io/component: secrets
          app.kubernetes.io/part-of: settla
  data:
    # Slack incoming-webhook URL for alert notifications.
    # Create at: https://api.slack.com/apps → Incoming Webhooks
    - secretKey: slack-webhook-url
      remoteRef:
        key: settla/production/alertmanager
        property: slack-webhook-url

    # PagerDuty Events API v2 Integration Key (Routing Key).
    # Create an "Events API v2" integration on your PagerDuty service.
    - secretKey: pagerduty-service-key
      remoteRef:
        key: settla/production/alertmanager
        property: pagerduty-service-key

    # Token for the auto-remediation webhook sidecar.
    # Must match REMEDIATION_WEBHOOK_TOKEN in the remediation script.
    # Generate: openssl rand -hex 32
    - secretKey: remediation-webhook-token
      remoteRef:
        key: settla/production/alertmanager
        property: remediation-webhook-token
