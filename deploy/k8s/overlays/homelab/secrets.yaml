# Homelab secrets — encrypt with SOPS + age before committing.
#
# To encrypt:  sops -e -i deploy/k8s/overlays/homelab/secrets.yaml
# To decrypt:  sops -d -i deploy/k8s/overlays/homelab/secrets.yaml
# To edit:     sops deploy/k8s/overlays/homelab/secrets.yaml
#
# These mirror the shape of the ExternalSecrets in base/secrets/ so
# workloads can consume the same secretKeyRef selectors.
---
apiVersion: v1
kind: Secret
metadata:
  name: settla-db-credentials
  labels:
    app.kubernetes.io/name: settla-db-credentials
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: settla
    environment: homelab
type: Opaque
stringData:
  # Credentials for connecting to external MacBook Postgres.
  # Must match the Postgres user/password configured on the MacBooks.
  superuser-password: "CHANGE_ME"
  replication-password: "CHANGE_ME"
  app-password: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: patroni-credentials
  labels:
    app.kubernetes.io/name: patroni-credentials
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: settla
    environment: homelab
type: Opaque
stringData:
  # PgBouncer references this secret name directly.
  superuser-password: "CHANGE_ME"
  replication-password: "CHANGE_ME"
  app-password: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: settla-app-secrets
  labels:
    app.kubernetes.io/name: settla-app-secrets
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: settla
    environment: homelab
type: Opaque
stringData:
  tyk-secret: "CHANGE_ME"
  # Generate with: openssl rand -hex 32
  wallet-encryption-key: "CHANGE_ME"
  # Generate with: openssl rand -hex 64
  master-seed: "CHANGE_ME"
  dashboard-api-key: ""
  tron-api-key: ""
  redis-password: ""
  grafana-admin-password: "settla-homelab"
---
apiVersion: v1
kind: Secret
metadata:
  name: settla-webhook-secrets
  labels:
    app.kubernetes.io/name: settla-webhook-secrets
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: settla
    environment: homelab
type: Opaque
stringData:
  lemfi-webhook-secret: "CHANGE_ME"
  fincra-webhook-secret: "CHANGE_ME"
  paystack-webhook-secret: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secrets
  labels:
    app.kubernetes.io/name: alertmanager-secrets
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: settla
    environment: homelab
type: Opaque
stringData:
  slack-webhook-url: "https://hooks.slack.com/services/placeholder/placeholder/placeholder"
  pagerduty-service-key: "homelab-placeholder"
  remediation-webhook-token: "homelab-placeholder"
---
apiVersion: v1
kind: Secret
metadata:
  name: backup-secrets
  labels:
    app.kubernetes.io/name: backup-secrets
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: settla
    environment: homelab
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"
  VERIFY_PG_PASSWORD: "CHANGE_ME"
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/placeholder/placeholder/placeholder"
  PAGERDUTY_ROUTING_KEY: ""
  NATS_CREDS_CONTENT: ""
