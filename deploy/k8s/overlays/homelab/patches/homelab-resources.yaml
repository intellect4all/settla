# Homelab resource allocations: fits within 24 CPU / 96GB across 3 nodes.
# CPU requests sum to ~11 cores, leaving ~13 cores headroom (3 nodes) or ~5 cores (2 nodes degraded).
# Memory requests sum to ~14.5Gi, leaving ~81Gi headroom.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: settla-server
spec:
  template:
    spec:
      containers:
        - name: settla-server
          resources:
            requests:
              cpu: "1500m"
              memory: "2Gi"
            limits:
              cpu: "3"
              memory: "4Gi"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: settla-node
spec:
  template:
    spec:
      containers:
        - name: settla-node
          resources:
            requests:
              cpu: "1"
              memory: "1536Mi"
            limits:
              cpu: "2"
              memory: "3Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  template:
    spec:
      containers:
        - name: gateway
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook
spec:
  template:
    spec:
      containers:
        - name: webhook
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: settla
spec:
  template:
    spec:
      containers:
        - name: alertmanager
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "150m"
              memory: "128Mi"
        - name: remediation
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: settla
spec:
  template:
    spec:
      containers:
        - name: prometheus
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: settla
spec:
  template:
    spec:
      containers:
        - name: grafana
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
