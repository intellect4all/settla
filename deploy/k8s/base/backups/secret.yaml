# ExternalSecret — backup job credentials
#
# Maps AWS Secrets Manager path `settla/production/backup` → K8s Secret
# `backup-secrets` (consumed by backup CronJobs).
#
# AWS Secrets Manager path to create:
#   Name:    settla/production/backup
#   Type:    Other (plain JSON)
#   Value:
#     {
#       "postgres-transfer-password": "<transfer DB password>",
#       "postgres-ledger-password": "<ledger DB password>",
#       "postgres-treasury-password": "<treasury DB password>",
#       "verify-pg-password": "<password for restore-test Postgres instance>",
#       "slack-webhook-url": "https://hooks.slack.com/services/<WORKSPACE>/<CHANNEL>/<TOKEN>",
#       "pagerduty-routing-key": "<PagerDuty-Events-API-v2-routing-key>",
#       "nats-creds-content": ""
#     }
#
# How to create in AWS CLI:
#   aws secretsmanager create-secret \
#     --name settla/production/backup \
#     --region eu-west-1 \
#     --secret-string '{
#       "postgres-transfer-password": "CHANGE_ME",
#       "postgres-ledger-password": "CHANGE_ME",
#       "postgres-treasury-password": "CHANGE_ME",
#       "verify-pg-password": "CHANGE_ME",
#       "slack-webhook-url": "CHANGE_ME",
#       "pagerduty-routing-key": "",
#       "nats-creds-content": ""
#     }'
#
# AWS credentials for S3 access:
#   Use IRSA (IAM Roles for Service Accounts) instead of embedding keys.
#   Annotate the settla-backup ServiceAccount with the role ARN:
#     eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/settla-backup-irsa-prod
#   This is done via deploy/k8s/overlays/production/patches/backup-production.yaml.
#
# Consumed by:
#   - deploy/k8s/base/backups/postgres-backup-cronjob.yaml  (POSTGRES_*_PASSWORD, SLACK_WEBHOOK_URL)
#   - deploy/k8s/base/backups/tigerbeetle-backup-cronjob.yaml  (SLACK_WEBHOOK_URL, PAGERDUTY_ROUTING_KEY)
#   - deploy/k8s/base/backups/nats-backup-cronjob.yaml  (NATS_CREDS_CONTENT, SLACK_WEBHOOK_URL)
#   - deploy/k8s/base/backups/backup-verify-cronjob.yaml  (VERIFY_PG_PASSWORD, SLACK_WEBHOOK_URL)
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backup-secrets
  namespace: settla
  labels:
    app.kubernetes.io/name: backup-secrets
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: settla
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: settla-aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: backup-secrets
    creationPolicy: Owner
    immutable: false
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: backup-secrets
          app.kubernetes.io/component: backup
          app.kubernetes.io/part-of: settla
  data:
    # Per-database PostgreSQL passwords for the 'settla' user.
    # Must match the per-DB passwords in settla/production/db.
    - secretKey: POSTGRES_TRANSFER_PASSWORD
      remoteRef:
        key: settla/production/backup
        property: postgres-transfer-password
    - secretKey: POSTGRES_LEDGER_PASSWORD
      remoteRef:
        key: settla/production/backup
        property: postgres-ledger-password
    - secretKey: POSTGRES_TREASURY_PASSWORD
      remoteRef:
        key: settla/production/backup
        property: postgres-treasury-password

    # PostgreSQL password for the throwaway restore-test instance.
    - secretKey: VERIFY_PG_PASSWORD
      remoteRef:
        key: settla/production/backup
        property: verify-pg-password

    # Slack incoming-webhook URL for backup success/failure notifications.
    - secretKey: SLACK_WEBHOOK_URL
      remoteRef:
        key: settla/production/backup
        property: slack-webhook-url

    # PagerDuty Events API v2 Routing Key.
    # Leave empty ("") in non-production environments to suppress pages.
    - secretKey: PAGERDUTY_ROUTING_KEY
      remoteRef:
        key: settla/production/backup
        property: pagerduty-routing-key

    # NATS credentials file content (JetStream auth).
    # Leave empty if NATS runs without auth.
    - secretKey: NATS_CREDS_CONTENT
      remoteRef:
        key: settla/production/backup
        property: nats-creds-content
