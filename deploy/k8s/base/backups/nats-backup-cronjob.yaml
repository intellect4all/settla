apiVersion: batch/v1
kind: CronJob
metadata:
  name: nats-backup
  namespace: settla
  labels:
    app.kubernetes.io/name: nats-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: settla
  annotations:
    # Schedule: every 6 hours — matches docs/disaster-recovery.md NATS backup strategy.
    # Uses the NATS CLI `nats stream backup` command to snapshot all Settla JetStream
    # streams (SETTLA_TRANSFERS, SETTLA_EVENTS, SETTLA_WEBHOOKS, SETTLA_OUTBOX).
    # Archives streams to a tar.gz and uploads to S3. Retention: 48 hours.
    settla.io/backup-type: "nats-stream-snapshot"
    settla.io/retention: "48h"
    settla.io/rpo: "6h"
spec:
  # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC.
  schedule: "0 */6 * * *"

  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600  # 1 hour grace window

  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: nats-backup
        app.kubernetes.io/component: backup
        app.kubernetes.io/part-of: settla
    spec:
      backoffLimit: 2
      # 1 hour max: stream snapshot across 4 streams + archive + S3 upload.
      activeDeadlineSeconds: 3600
      ttlSecondsAfterFinished: 86400

      template:
        metadata:
          labels:
            app.kubernetes.io/name: nats-backup
            app.kubernetes.io/component: backup
            app.kubernetes.io/part-of: settla
          annotations:
            prometheus.io/scrape: "false"
        spec:
          restartPolicy: OnFailure
          serviceAccountName: settla-backup

          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            seccompProfile:
              type: RuntimeDefault

          volumes:
            - name: backup-scripts
              configMap:
                name: backup-scripts
                defaultMode: 0755
            - name: tmp
              emptyDir:
                sizeLimit: "10Gi"
            # NATS credentials file — mounted from the backup-secrets Secret.
            # If NATS runs without auth (development), the script handles the
            # empty-string case gracefully.
            - name: nats-creds
              secret:
                secretName: backup-secrets
                items:
                  - key: NATS_CREDS_CONTENT
                    path: nats.creds
                defaultMode: 0400
                optional: true

          containers:
            - name: nats-backup
              # Image must include: nats-cli, aws-cli v2, tar, gzip, curl.
              image: ghcr.io/intellect4all/settla-backup-tools:latest
              imagePullPolicy: IfNotPresent

              command: ["/bin/bash", "/scripts/nats-backup.sh"]

              resources:
                requests:
                  cpu: "250m"
                  memory: "256Mi"
                limits:
                  cpu: "1"
                  memory: "2Gi"

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]

              volumeMounts:
                - name: backup-scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
                - name: nats-creds
                  mountPath: /etc/nats
                  readOnly: true

              env:
                - name: ENVIRONMENT
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: ENVIRONMENT
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: S3_BUCKET
                - name: S3_PREFIX
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: NATS_S3_PREFIX
                - name: NATS_URL
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: NATS_URL
                - name: RETENTION_HOURS
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: NATS_RETENTION_HOURS
                # Path to the mounted credentials file; empty string = no auth.
                - name: NATS_CREDS
                  value: "/etc/nats/nats.creds"
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: SLACK_WEBHOOK_URL
                      optional: true
                - name: PAGERDUTY_ROUTING_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: PAGERDUTY_ROUTING_KEY
                      optional: true
                - name: AWS_REGION
                  value: "us-east-1"
                - name: AWS_DEFAULT_REGION
                  value: "us-east-1"
