openapi: 3.1.0
info:
  title: Settla API
  version: 1.0.0
  description: 'B2B stablecoin settlement infrastructure for fintechs. Settla enables cross-border payments through stablecoin
    rails with automatic on-ramp, off-ramp, and treasury management.


    All monetary amounts are represented as decimal strings to preserve precision. All IDs are UUIDs. All timestamps are in
    UTC (RFC 3339).'
  contact:
    name: Settla Support
    email: support@settla.io
    url: https://docs.settla.io
  license:
    name: Proprietary
servers:
- url: https://api.settla.io
  description: Production
- url: https://sandbox.settla.io
  description: Sandbox
security:
- BearerAuth: []
tags:
- name: Authentication
  description: Register, login, email verification, token refresh, and KYB submission.
- name: Quotes
  description: Create and retrieve FX quotes for cross-border transfers. Quotes include fee breakdowns and routing information.
    Cached for 30 seconds.
- name: Transfers
  description: Create, retrieve, list, and cancel cross-border transfers. Transfers progress through a state machine from
    CREATED to COMPLETED or FAILED.
- name: Treasury
  description: Manage treasury positions, liquidity, top-ups, withdrawals, and position event history.
- name: Crypto Deposits
  description: Create on-chain deposit sessions for receiving stablecoin payments. Supports Tron, Ethereum, Solana, Base,
    Polygon, and Arbitrum.
- name: Bank Deposits
  description: Create fiat deposit sessions via virtual bank accounts. Supports automatic reconciliation and mismatch policies.
- name: Payment Links
  description: Generate shareable payment links for merchant collections. Links resolve to crypto deposit sessions.
- name: Routes
  description: Query available routing options for a currency pair, with scoring breakdown.
- name: Verification
  description: Verify and look up transactions by ID, reference, or blockchain transaction hash.
- name: Analytics
  description: Transfer analytics, fee reports, provider metrics, reconciliation status, deposit metrics, and data exports.
- name: Tenant Portal
  description: 'Tenant self-service: profile, API keys, webhook configuration, and dashboard metrics.'
- name: Webhooks
  description: Inbound provider webhook endpoint for async payment provider callbacks.
- name: Health
  description: Health and readiness probes for monitoring.
- name: Ledger
  description: Double-entry ledger accounts and transaction history (read model powered by TigerBeetle)
- name: Ops
  description: Internal operations endpoints (requires X-Ops-Api-Key)
paths:
  /v1/auth/register:
    post:
      operationId: registerTenant
      summary: Register a new tenant
      description: Creates a new tenant account. A verification email is sent to the provided address. The tenant must complete
        email verification before accessing most API endpoints.
      tags:
      - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - company_name
              - email
              - password
              properties:
                company_name:
                  type: string
                  description: Legal company name of the fintech.
                  example: Acme Payments Ltd
                email:
                  type: string
                  format: email
                  description: Primary contact email address.
                  example: admin@acmepay.com
                password:
                  type: string
                  minLength: 8
                  description: Account password. Minimum 8 characters.
                  example: s3cur3Pa$$w0rd!
                display_name:
                  type: string
                  description: Display name shown in the portal. Defaults to company_name if omitted.
                  example: Acme Pay
      responses:
        '201':
          description: Tenant registered successfully. Verification email sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id:
                    type: string
                    format: uuid
                    example: c3d4e5f6-7890-1234-abcd-ef0123456789
                  user_id:
                    type: string
                    format: uuid
                    example: d4e5f678-9012-3456-bcde-f01234567890
                  email:
                    type: string
                    format: email
                    example: admin@acmepay.com
                  message:
                    type: string
                    example: Registration successful. Please verify your email.
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/login:
    post:
      operationId: login
      summary: Authenticate and obtain tokens
      description: Authenticates a user with email and password, returning JWT access and refresh tokens. Rate limited to
        10 requests per minute per IP.
      tags:
      - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              properties:
                email:
                  type: string
                  format: email
                  example: admin@acmepay.com
                password:
                  type: string
                  example: s3cur3Pa$$w0rd!
      responses:
        '200':
          description: Authentication successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: JWT access token. Use as Bearer token for API requests.
                    example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                  refresh_token:
                    type: string
                    description: Refresh token for obtaining new access tokens.
                    example: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...
                  expires_in:
                    type: integer
                    description: Access token validity in seconds.
                    example: 3600
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: d4e5f678-9012-3456-bcde-f01234567890
                      email:
                        type: string
                        format: email
                        example: admin@acmepay.com
                      tenant_id:
                        type: string
                        format: uuid
                        example: c3d4e5f6-7890-1234-abcd-ef0123456789
                      role:
                        type: string
                        example: admin
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/verify-email:
    post:
      operationId: verifyEmail
      summary: Verify email address
      description: Verifies a tenant's email address using the token sent during registration.
      tags:
      - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - token
              properties:
                token:
                  type: string
                  description: Email verification token from the verification link.
                  example: eyJhbGciOiJIUzI1NiJ9.dG9rZW4...
      responses:
        '200':
          description: Email verified successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Email verified successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token
      description: Exchanges a valid refresh token for a new access token.
      tags:
      - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: The refresh token obtained from login.
                  example: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...
      responses:
        '200':
          description: Token refreshed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                  expires_in:
                    type: integer
                    example: 3600
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/me/kyb:
    post:
      operationId: submitKyb
      summary: Submit KYB application
      description: Submits a Know Your Business (KYB) application for the authenticated tenant. Required before processing
        live transactions.
      tags:
      - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - company_registration_number
              - country
              - business_type
              - contact_name
              - contact_email
              properties:
                company_registration_number:
                  type: string
                  description: Official company registration or incorporation number.
                  example: '12345678'
                country:
                  type: string
                  minLength: 2
                  maxLength: 2
                  description: Country of incorporation (ISO 3166-1 alpha-2).
                  example: GB
                business_type:
                  type: string
                  enum:
                  - fintech
                  - bank
                  - payment_processor
                  - other
                  description: Type of business.
                  example: fintech
                contact_name:
                  type: string
                  description: Primary contact full name.
                  example: Jane Smith
                contact_email:
                  type: string
                  format: email
                  description: Primary contact email.
                  example: jane@acmepay.com
                contact_phone:
                  type: string
                  description: Primary contact phone number.
                  example: +44 7700 900000
      responses:
        '200':
          description: KYB application submitted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: KYB application submitted successfully.
                  kyb_status:
                    type: string
                    enum:
                    - pending
                    - approved
                    - rejected
                    - under_review
                    example: pending
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/quotes:
    post:
      operationId: createQuote
      summary: Create a quote
      description: Creates an FX quote for a cross-border transfer. Quotes include the exchange rate, fee breakdown, and recommended
        route. Quotes are cached for 30 seconds (bucketed) and expire after the time indicated in `expires_at`.
      tags:
      - Quotes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - source_currency
              - source_amount
              - dest_currency
              properties:
                source_currency:
                  type: string
                  pattern: ^[A-Z]{3,5}$
                  description: Source currency code (e.g. GBP, NGN, USD, EUR).
                  example: GBP
                source_amount:
                  type: string
                  description: Amount in source currency. Decimal string for precision.
                  example: '1000.00'
                dest_currency:
                  type: string
                  pattern: ^[A-Z]{3,5}$
                  description: Destination currency code.
                  example: NGN
                dest_country:
                  type: string
                  minLength: 2
                  maxLength: 2
                  description: Destination country (ISO 3166-1 alpha-2). Used for route optimization.
                  example: NG
      responses:
        '200':
          description: Quote created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quote'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/quotes/{quoteId}:
    get:
      operationId: getQuote
      summary: Get a quote
      description: Retrieves an existing quote by ID. Returns 404 if the quote has expired and been purged.
      tags:
      - Quotes
      parameters:
      - name: quoteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Quote ID.
      responses:
        '200':
          description: Quote retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quote'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/transfers:
    post:
      operationId: createTransfer
      summary: Create a transfer
      description: 'Initiates a new cross-border transfer. The transfer progresses through a state machine: CREATED -> FUNDED
        -> ON_RAMPING -> SETTLING -> OFF_RAMPING -> COMPLETED. Each state transition is driven by the outbox relay and dedicated
        workers.


        The `idempotency_key` field is required and ensures that duplicate requests with the same key return the original
        transfer instead of creating a new one.'
      tags:
      - Transfers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - idempotency_key
              - source_currency
              - source_amount
              - dest_currency
              - recipient
              properties:
                idempotency_key:
                  type: string
                  minLength: 1
                  maxLength: 256
                  description: Client-generated unique key for idempotency. Scoped per tenant.
                  example: txn_20240315_001
                external_ref:
                  type: string
                  description: Your internal reference for this transfer.
                  example: INV-2024-0042
                source_currency:
                  type: string
                  pattern: ^[A-Z]{3,5}$
                  description: Source currency code.
                  example: GBP
                source_amount:
                  type: string
                  description: Amount in source currency. Decimal string. Minimum 0.01, maximum 10,000,000.
                  example: '1000.00'
                dest_currency:
                  type: string
                  pattern: ^[A-Z]{3,5}$
                  description: Destination currency code.
                  example: NGN
                sender:
                  $ref: '#/components/schemas/Sender'
                recipient:
                  $ref: '#/components/schemas/Recipient'
                quote_id:
                  type: string
                  format: uuid
                  description: Optional quote ID to lock in the quoted rate and fees.
      responses:
        '201':
          description: Transfer created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      operationId: listTransfers
      summary: List transfers
      description: Retrieves a paginated list of transfers for the authenticated tenant. Supports filtering by status and
        free-text search.
      tags:
      - Transfers
      parameters:
      - name: page_size
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 1000
        description: Number of transfers per page.
      - name: page_token
        in: query
        schema:
          type: string
        description: Cursor token for the next page. Obtained from `next_page_token` in a previous response.
      - name: status
        in: query
        schema:
          type: string
          enum:
          - CREATED
          - FUNDED
          - ON_RAMPING
          - SETTLING
          - OFF_RAMPING
          - COMPLETED
          - FAILED
          - REFUNDING
          - REFUNDED
        description: Filter by transfer status.
      - name: search
        in: query
        schema:
          type: string
        description: Free-text search across external_ref, idempotency_key, and recipient name.
      responses:
        '200':
          description: Transfer list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  transfers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transfer'
                  next_page_token:
                    type: string
                    description: Cursor for the next page. Absent if this is the last page.
                    example: eyJpZCI6IjEyMzQ1Njc4In0=
                  total_count:
                    type: integer
                    description: Total number of transfers matching the filters.
                    example: 1542
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/transfers/{transferId}:
    get:
      operationId: getTransfer
      summary: Get a transfer
      description: Retrieves the full details of a transfer by ID, including blockchain transactions and fee breakdown.
      tags:
      - Transfers
      parameters:
      - name: transferId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Transfer ID.
      responses:
        '200':
          description: Transfer retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/transfers/{transferId}/events:
    get:
      operationId: getTransferEvents
      summary: Get transfer events
      description: Retrieves the full event history for a transfer, showing each state transition with timestamps and metadata.
      tags:
      - Transfers
      parameters:
      - name: transferId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Transfer ID.
      responses:
        '200':
          description: Transfer events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/TransferEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/transfers/{transferId}/cancel:
    post:
      operationId: cancelTransfer
      summary: Cancel a transfer
      description: Requests cancellation of a transfer. Only transfers in CREATED or FUNDED status can be cancelled. Transfers
        in later states require manual review.
      tags:
      - Transfers
      parameters:
      - name: transferId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Transfer ID.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional cancellation reason.
                  example: Customer requested cancellation.
      responses:
        '200':
          description: Transfer cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/treasury/positions:
    get:
      operationId: listPositions
      summary: List treasury positions
      description: Returns all treasury positions for the authenticated tenant. Each position represents a currency balance
        at a specific location (e.g. GBP in the UK clearing account).
      tags:
      - Treasury
      responses:
        '200':
          description: Treasury positions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  positions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Position'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/treasury/positions/{currency}/{location}:
    get:
      operationId: getPosition
      summary: Get a treasury position
      description: Retrieves a specific treasury position by currency and location.
      tags:
      - Treasury
      parameters:
      - name: currency
        in: path
        required: true
        schema:
          type: string
          pattern: ^[A-Z]{3,5}$
        description: Currency code (e.g. GBP, USDT).
        example: USDT
      - name: location
        in: path
        required: true
        schema:
          type: string
        description: Position location identifier (e.g. tron, ethereum, uk_clearing).
        example: tron
      responses:
        '200':
          description: Position retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Position'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/treasury/liquidity:
    get:
      operationId: getLiquidityReport
      summary: Get liquidity report
      description: Returns an aggregated liquidity report across all positions, including total available balances per currency
        and alert positions where balances are below minimum thresholds.
      tags:
      - Treasury
      responses:
        '200':
          description: Liquidity report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidityReport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/treasury/topup:
    post:
      operationId: topUpPosition
      summary: Top up a treasury position
      description: Initiates a top-up (deposit) to a treasury position. The position is credited once funds are confirmed.
      tags:
      - Treasury
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - currency
              - location
              - amount
              properties:
                currency:
                  type: string
                  pattern: ^[A-Z]{3,5}$
                  description: Currency code.
                  example: USDT
                location:
                  type: string
                  description: Position location.
                  example: tron
                amount:
                  type: string
                  description: Top-up amount. Decimal string.
                  example: '50000.00'
                method:
                  type: string
                  enum:
                  - bank_transfer
                  - crypto
                  - internal
                  description: Top-up method. Defaults to bank_transfer.
                  example: crypto
      responses:
        '201':
          description: Top-up initiated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionTransaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/treasury/withdraw:
    post:
      operationId: withdrawPosition
      summary: Withdraw from a treasury position
      description: Initiates a withdrawal from a treasury position. The amount must not exceed the available (unlocked) balance.
      tags:
      - Treasury
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - currency
              - location
              - amount
              - method
              - destination
              properties:
                currency:
                  type: string
                  pattern: ^[A-Z]{3,5}$
                  example: USDT
                location:
                  type: string
                  example: tron
                amount:
                  type: string
                  description: Withdrawal amount. Decimal string.
                  example: '10000.00'
                method:
                  type: string
                  enum:
                  - bank_transfer
                  - crypto
                  example: crypto
                destination:
                  type: string
                  description: Destination address or account number for the withdrawal.
                  example: TXkR2...7xN3
      responses:
        '201':
          description: Withdrawal initiated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionTransaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/treasury/transactions:
    get:
      operationId: listPositionTransactions
      summary: List position transactions
      description: Retrieves a paginated list of treasury position transactions (top-ups and withdrawals).
      tags:
      - Treasury
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
        description: Number of transactions per page.
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
          minimum: 0
        description: Number of transactions to skip.
      responses:
        '200':
          description: Position transactions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/PositionTransaction'
                  totalCount:
                    type: integer
                    example: 87
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/treasury/transactions/{id}:
    get:
      operationId: getPositionTransaction
      summary: Get a position transaction
