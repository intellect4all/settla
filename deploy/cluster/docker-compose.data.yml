# ==========================================================================
# DATA TIER — Run on fedora-data (32GB RAM, 1TB SSD)
# PostgreSQL x3, PgBouncer x3, TigerBeetle, Redis
#
# Usage:
#   docker compose -f deploy/cluster/docker-compose.data.yml \
#     --env-file deploy/cluster/.env.cluster up -d
# ==========================================================================

services:
  # ── PostgreSQL (one per bounded context) ─────────────────────────

  postgres-ledger:
    image: postgres:16-alpine
    command:
      - "postgres"
      - "-c"
      - "max_connections=400"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=3GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
    environment:
      POSTGRES_DB: settla_ledger
      POSTGRES_USER: ${POSTGRES_USER:-settla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-settla}
      SETTLA_APP_DB_PASSWORD: ${SETTLA_APP_DB_PASSWORD:-settla_app}
    ports:
      - "5433:5432"
    volumes:
      - pgdata-ledger:/var/lib/postgresql/data
      - ../docker/init-rls-role.sh:/docker-entrypoint-initdb.d/init-rls-role.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-settla} -d settla_ledger"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
        reservations:
          memory: 2G

  postgres-transfer:
    image: postgres:16-alpine
    command:
      - "postgres"
      - "-c"
      - "max_connections=400"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "max_wal_size=4GB"
    environment:
      POSTGRES_DB: settla_transfer
      POSTGRES_USER: ${POSTGRES_USER:-settla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-settla}
      SETTLA_APP_DB_PASSWORD: ${SETTLA_APP_DB_PASSWORD:-settla_app}
    ports:
      - "5434:5432"
    volumes:
      - pgdata-transfer:/var/lib/postgresql/data
      - ../docker/init-rls-role.sh:/docker-entrypoint-initdb.d/init-rls-role.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-settla} -d settla_transfer"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "6.0"
        reservations:
          memory: 3G

  postgres-treasury:
    image: postgres:16-alpine
    command:
      - "postgres"
      - "-c"
      - "max_connections=400"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1GB"
    environment:
      POSTGRES_DB: settla_treasury
      POSTGRES_USER: ${POSTGRES_USER:-settla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-settla}
      SETTLA_APP_DB_PASSWORD: ${SETTLA_APP_DB_PASSWORD:-settla_app}
    ports:
      - "5435:5432"
    volumes:
      - pgdata-treasury:/var/lib/postgresql/data
      - ../docker/init-rls-role.sh:/docker-entrypoint-initdb.d/init-rls-role.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-settla} -d settla_treasury"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G

  # ── PgBouncer ───────────────────────────────────────────────────

  pgbouncer-ledger:
    image: edoburu/pgbouncer:1.21.0-p2
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-ledger:5432/settla_ledger
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 4000
      DEFAULT_POOL_SIZE: 200
      MIN_POOL_SIZE: 50
      RESERVE_POOL_SIZE: 30
      RESERVE_POOL_TIMEOUT: 5
      SERVER_IDLE_TIMEOUT: 300
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      AUTH_TYPE: scram-sha-256
    ports:
      - "6433:5432"
    depends_on:
      postgres-ledger:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M

  pgbouncer-transfer:
    image: edoburu/pgbouncer:1.21.0-p2
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-transfer:5432/settla_transfer
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 4000
      DEFAULT_POOL_SIZE: 200
      MIN_POOL_SIZE: 50
      RESERVE_POOL_SIZE: 30
      RESERVE_POOL_TIMEOUT: 5
      SERVER_IDLE_TIMEOUT: 300
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      AUTH_TYPE: scram-sha-256
    ports:
      - "6434:5432"
    depends_on:
      postgres-transfer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M

  pgbouncer-treasury:
    image: edoburu/pgbouncer:1.21.0-p2
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-treasury:5432/settla_treasury
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 4000
      DEFAULT_POOL_SIZE: 200
      MIN_POOL_SIZE: 50
      RESERVE_POOL_SIZE: 30
      RESERVE_POOL_TIMEOUT: 5
      SERVER_IDLE_TIMEOUT: 300
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      AUTH_TYPE: scram-sha-256
    ports:
      - "6435:5432"
    depends_on:
      postgres-treasury:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M

  # ── TigerBeetle ─────────────────────────────────────────────────

  tigerbeetle-init:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.11
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /data/0_0.tigerbeetle ]; then
          echo "TigerBeetle data file already exists, skipping format."
          exit 0
        fi
        /tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle
    volumes:
      - tbdata:/data
    deploy:
      resources:
        limits:
          memory: 512M

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.11
    command:
      - "start"
      - "--addresses=0.0.0.0:3001"
      - "/data/0_0.tigerbeetle"
    ports:
      - "3001:3001"
    volumes:
      - tbdata:/data
    depends_on:
      tigerbeetle-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "echo '' | timeout 3 /tigerbeetle repl --cluster=0 --addresses=127.0.0.1:3001 2>&1 | grep -q 'connected to replica'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
        reservations:
          memory: 2G

  # ── Redis ───────────────────────────────────────────────────────

  redis:
    image: redis:7.2-alpine
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:-settla-dev}"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "2gb"
      - "--maxmemory-policy"
      - "volatile-lru"
      - "--tcp-backlog"
      - "511"
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-settla-dev} --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

volumes:
  pgdata-ledger:
  pgdata-transfer:
  pgdata-treasury:
  tbdata:
  redisdata:
