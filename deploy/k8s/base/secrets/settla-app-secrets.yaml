# ExternalSecret — application secrets
#
# Maps AWS Secrets Manager path `settla/production/app` → K8s Secret
# `settla-app-secrets`.
#
# AWS Secrets Manager path to create:
#   Name:    settla/production/app
#   Type:    Other (plain JSON)
#   Value:
#     {
#       "tyk-secret": "<random-string-min-32-chars>",
#       "wallet-encryption-key": "<hex-string-64-chars; openssl rand -hex 32>",
#       "master-seed": "<hex-string-128-chars; openssl rand -hex 64>",
#       "dashboard-api-key": "<valid-tenant-api-key-for-ops-dashboard>",
#       "tron-api-key": "<TronGrid-API-key>",
#       "redis-password": "<redis-auth-password-if-enabled>",
#       "grafana-admin-password": "<strong-random-password>"
#     }
#
# How to create in AWS CLI:
#   aws secretsmanager create-secret \
#     --name settla/production/app \
#     --region eu-west-1 \
#     --secret-string '{
#       "tyk-secret": "CHANGE_ME",
#       "wallet-encryption-key": "CHANGE_ME",
#       "master-seed": "CHANGE_ME",
#       "dashboard-api-key": "CHANGE_ME",
#       "tron-api-key": "CHANGE_ME",
#       "redis-password": "CHANGE_ME",
#       "grafana-admin-password": "CHANGE_ME"
#     }'
#
# Consumed by:
#   - deploy/tyk/tyk.conf         (TYK_SECRET env var)
#   - cmd/settla-server/main.go   (SETTLA_WALLET_ENCRYPTION_KEY, SETTLA_MASTER_SEED)
#   - dashboard/composables/      (NUXT_PUBLIC_DASHBOARD_API_KEY)
#   - rail/blockchain/tron        (SETTLA_TRON_API_KEY)
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: settla-app-secrets
  labels:
    app.kubernetes.io/name: settla-app-secrets
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: settla
spec:
  # Sync every 1 hour. Reduce to 5m for secrets that rotate more frequently.
  refreshInterval: 1h
  secretStoreRef:
    name: settla-aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: settla-app-secrets
    creationPolicy: Owner
    immutable: false
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: settla-app-secrets
          app.kubernetes.io/component: secrets
          app.kubernetes.io/part-of: settla
  data:
    # Tyk API gateway admin secret — used by tyk.conf and Tyk admin API calls.
    # Referenced as TYK_SECRET in the Tyk ConfigMap/deployment.
    - secretKey: tyk-secret
      remoteRef:
        key: settla/production/app
        property: tyk-secret

    # AES-256 key for encrypting wallet private keys at rest.
    # Generate: openssl rand -hex 32
    # REQUIRED when SETTLA_PROVIDER_MODE=live or SETTLA_PROVIDER_MODE=testnet
    - secretKey: wallet-encryption-key
      remoteRef:
        key: settla/production/app
        property: wallet-encryption-key

    # BIP-39 master seed for HD wallet derivation.
    # Generate: openssl rand -hex 64
    # REQUIRED when SETTLA_PROVIDER_MODE=live or SETTLA_PROVIDER_MODE=testnet
    - secretKey: master-seed
      remoteRef:
        key: settla/production/app
        property: master-seed

    # API key for the ops dashboard. Must be a valid tenant API key
    # (SHA-256 hash stored in Transfer DB `api_keys` table).
    - secretKey: dashboard-api-key
      remoteRef:
        key: settla/production/app
        property: dashboard-api-key

    # TronGrid API key for higher rate limits on Tron RPC calls.
    # Optional; omit key from JSON if not using TronGrid.
    - secretKey: tron-api-key
      remoteRef:
        key: settla/production/app
        property: tron-api-key

    # Redis AUTH password (if Redis is configured with requirepass).
    # If Redis runs without a password (not recommended for production),
    # remove this entry and leave SETTLA_REDIS_URL without credentials.
    - secretKey: redis-password
      remoteRef:
        key: settla/production/app
        property: redis-password

    # Grafana admin password — used by infrastructure/grafana/deployment.yaml.
    # Replaces the hardcoded "admin" default.
    - secretKey: grafana-admin-password
      remoteRef:
        key: settla/production/app
        property: grafana-admin-password
