# ExternalSecret — outbound webhook HMAC-SHA256 signing secrets
#
# Maps AWS Secrets Manager path `settla/production/webhooks` → K8s Secret
# `settla-webhook-secrets`.
#
# The webhook dispatcher (api/webhook/src/) uses these secrets to sign every
# outbound webhook payload with HMAC-SHA256.  Each tenant has its own secret
# so a compromised tenant key cannot be used to forge webhooks for another tenant.
#
# AWS Secrets Manager path to create:
#   Name:    settla/production/webhooks
#   Type:    Other (plain JSON)
#   Value:
#     {
#       "lemfi-webhook-secret": "<random-string-min-32-chars>",
#       "fincra-webhook-secret": "<random-string-min-32-chars>",
#       "paystack-webhook-secret": "<random-string-min-32-chars>"
#     }
#
# How to create in AWS CLI:
#   aws secretsmanager create-secret \
#     --name settla/production/webhooks \
#     --region eu-west-1 \
#     --secret-string '{
#       "lemfi-webhook-secret": "CHANGE_ME",
#       "fincra-webhook-secret": "CHANGE_ME",
#       "paystack-webhook-secret": "CHANGE_ME"
#     }'
#
# To add a new tenant webhook secret:
#   1. Add a new property to the JSON in AWS Secrets Manager.
#   2. Add a corresponding `data` entry below.
#   3. Reference the new key in the webhook deployment env block.
#   4. Apply the updated ExternalSecret — ESO will resync within refreshInterval.
#
# Consumed by:
#   - api/webhook/src/index.ts  (SETTLA_WEBHOOK_SIGNING_SECRET_<TENANT>)
#   - Outbound webhook dispatcher (HMAC-SHA256 X-Settla-Signature header)
#
# Seed tenant IDs (from Transfer DB seed data):
#   Lemfi:    a0000000-0000-0000-0000-000000000001
#   Fincra:   b0000000-0000-0000-0000-000000000002
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: settla-webhook-secrets
  labels:
    app.kubernetes.io/name: settla-webhook-secrets
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: settla
spec:
  # Webhook secrets should refresh more frequently since rotation is a
  # coordinated operation with the receiving fintech.
  refreshInterval: 1h
  secretStoreRef:
    name: settla-aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: settla-webhook-secrets
    creationPolicy: Owner
    immutable: false
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: settla-webhook-secrets
          app.kubernetes.io/component: secrets
          app.kubernetes.io/part-of: settla
  data:
    # Lemfi HMAC-SHA256 signing secret.
    # Corresponds to: LEMFI_WEBHOOK_SECRET env var in .env.example
    - secretKey: lemfi-webhook-secret
      remoteRef:
        key: settla/production/webhooks
        property: lemfi-webhook-secret

    # Fincra HMAC-SHA256 signing secret.
    # Corresponds to: FINCRA_WEBHOOK_SECRET env var in .env.example
    - secretKey: fincra-webhook-secret
      remoteRef:
        key: settla/production/webhooks
        property: fincra-webhook-secret

    # Paystack HMAC-SHA256 signing secret.
    # Add PAYSTACK_WEBHOOK_SECRET to .env.example when onboarding Paystack.
    - secretKey: paystack-webhook-secret
      remoteRef:
        key: settla/production/webhooks
        property: paystack-webhook-secret
