apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: settla
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: settla
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: settla
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
              name: http
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: alerts
              mountPath: /etc/prometheus/alerts
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: alerts
          configMap:
            name: prometheus-alerts
        - name: data
          emptyDir: {}  # Use PVC in production for persistence
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: settla
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: settla
---
# RBAC for Prometheus to discover pods via kubernetes_sd_configs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: settla-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: settla
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "nodes", "nodes/metrics"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: settla-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: settla
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: settla-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: settla
