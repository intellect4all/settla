# Development environment overrides
apiVersion: v1
kind: ConfigMap
metadata:
  name: settla-server-config
data:
  SETTLA_LOG_LEVEL: "debug"
  SETTLA_PROVIDER_MODE: "mock"
  SETTLA_MOCK_DELAY_MS: "100"
  SETTLA_PPROF: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: settla-node-config
data:
  SETTLA_LOG_LEVEL: "debug"
  SETTLA_PROVIDER_MODE: "mock"
  SETTLA_NODE_PARTITIONS: "1"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
data:
  SETTLA_LOG_LEVEL: "debug"
  SETTLA_GRPC_POOL_SIZE: "5"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-config
data:
  SETTLA_LOG_LEVEL: "debug"
