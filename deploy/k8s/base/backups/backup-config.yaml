apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-config
  namespace: settla
  labels:
    app.kubernetes.io/name: backup-config
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: settla
# Non-sensitive backup configuration.
# Sensitive values (passwords, webhook URLs, PagerDuty keys) live in the
# backup-secrets Secret (see secret.yaml — not committed to git; create via
# kubectl or External Secrets Operator in production).
#
# Override individual keys per environment using a kustomize patchesStrategicMerge
# or configMapGenerator in the overlay's kustomization.yaml.
data:
  # --- Shared ---
  ENVIRONMENT: "production"

  # --- S3 ---
  # Set the bucket name without the s3:// scheme. The backup scripts prepend it.
  # Override in each overlay:
  #   staging:    settla-backups-staging
  #   production: settla-backups-prod
  S3_BUCKET: "settla-backups-prod"

  # --- PostgreSQL backup ---
  # S3 prefix for Postgres dumps (no leading slash).
  POSTGRES_S3_PREFIX: "postgres"
  # Retention in days — aligns with docs/disaster-recovery.md: 30 days.
  POSTGRES_RETENTION_DAYS: "30"

  # --- TigerBeetle backup ---
  TB_DATA_FILE: "/data/0_0.tigerbeetle"
  TB_REPLICA_INDEX: "0"
  TB_S3_PREFIX: "tigerbeetle"
  # Retention in hours — aligns with docs/disaster-recovery.md: 72 hours.
  TB_RETENTION_HOURS: "72"

  # --- NATS backup ---
  NATS_URL: "nats://nats:4222"
  NATS_S3_PREFIX: "nats"
  # Retention in hours — aligns with docs/disaster-recovery.md: 48 hours.
  NATS_RETENTION_HOURS: "48"

  # --- Backup verification ---
  # Host of the throwaway Postgres instance used for daily restore tests.
  # In production this is a dedicated low-spec RDS instance (db.t3.medium).
  VERIFY_PG_HOST: "postgres-verify"
  VERIFY_PG_PORT: "5432"
  VERIFY_PG_USER: "postgres"
  POSTGRES_VERIFY_S3_PREFIX: "postgres"
  # Minimum row counts — raise these after initial data load.
  # The verify job alerts if a restored DB has fewer rows than these thresholds.
  MIN_ROWS_LEDGER: "0"
  MIN_ROWS_TRANSFER: "0"
  MIN_ROWS_TREASURY: "0"
