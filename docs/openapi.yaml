                    type: string
                    format: uuid
                  status:
                    type: string
                    enum:
                    - pending
                    - processing
                    - completed
                    - failed
                  export_type:
                    type: string
                  period:
                    type: string
                  format:
                    type: string
                  download_url:
                    type: string
                    format: uri
                  created_at:
                    type: string
                    format: date-time
                  completed_at:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/me:
    get:
      operationId: getTenant
