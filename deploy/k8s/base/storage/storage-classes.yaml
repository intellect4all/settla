# StorageClass definitions for Settla.
#
# fast-ssd  — TigerBeetle write-ahead log. gp3 with tuned IOPS (3,000 baseline).
#             Use fast-ssd-io2 via production overlay when >3,000 sustained IOPS
#             per volume are required.
# standard  — PostgreSQL (Patroni + plain), NATS JetStream, Redis. gp3 defaults.
#
# All classes:
#   reclaimPolicy: Retain            — operator must manually delete EBS volumes;
#                                      never auto-delete financial data.
#   volumeBindingMode: WaitForFirst  — provision in the same AZ as the scheduled
#                                      pod, eliminating cross-AZ I/O charges.
#   allowVolumeExpansion: true       — resize PVCs in-place (aws-ebs-csi-driver).

# -----------------------------------------------------------------------------
# fast-ssd — TigerBeetle (gp3, 3,000 IOPS / 125 MiB/s baseline).
# Production overlay can patch storageClassName to fast-ssd-io2 for guaranteed
# 16,000 IOPS when gp3 burst credits are insufficient under sustained load.
# -----------------------------------------------------------------------------
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-ssd
  labels:
    app.kubernetes.io/part-of: settla
    settla.io/storage-tier: fast
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  iops: "3000"
  throughput: "125"
  encrypted: "true"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
# fast-ssd-io2 — production TigerBeetle: guaranteed 16,000 IOPS via EBS io2.
# Switch to this class by patching the TigerBeetle StatefulSet's storageClassName
# in the production overlay (overlays/production/patches/).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-ssd-io2
  labels:
    app.kubernetes.io/part-of: settla
    settla.io/storage-tier: fast-io2
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: ebs.csi.aws.com
parameters:
  type: io2
  iops: "16000"
  encrypted: "true"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
# standard — PostgreSQL (Patroni + plain), NATS JetStream, Redis.
# gp3 baseline (3,000 IOPS / 125 MiB/s) is sufficient; IOPS and throughput can
# be scaled independently up to 16,000 / 1,000 MiB/s without reprovisioning.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard
  labels:
    app.kubernetes.io/part-of: settla
    settla.io/storage-tier: standard
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
