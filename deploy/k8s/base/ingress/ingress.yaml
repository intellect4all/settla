apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: settla-ingress
  annotations:
    # nginx-ingress controller annotations
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    # Rate limiting: allow 100 req/s per IP, burst up to 200
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
    # Preserve real client IP for per-tenant rate limiting
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/compute-full-forwarded-for: "true"
    # cert-manager will provision and renew the TLS certificate
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    #
    # AWS ALB alternative (replace nginx annotations above with these):
    # kubernetes.io/ingress.class: "alb"
    # alb.ingress.kubernetes.io/scheme: "internet-facing"
    # alb.ingress.kubernetes.io/target-type: "ip"
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443},{"HTTP":80}]'
    # alb.ingress.kubernetes.io/ssl-redirect: "443"
    # alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:REGION:ACCOUNT_ID:certificate/CERT_ID"
    # alb.ingress.kubernetes.io/healthcheck-path: "/health"
    # alb.ingress.kubernetes.io/group.name: "settla"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.settla.example.com
      secretName: settla-tls
  rules:
    - host: api.settla.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tyk
                port:
                  number: 8080
