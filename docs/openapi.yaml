                    type: integer
                    description: Response time in milliseconds.
                    example: 245
                  error:
                    type: string
                    description: Error message if the test failed.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/me/webhooks/deliveries:
    get:
      operationId: listWebhookDeliveries
      summary: List webhook deliveries
      description: Returns a paginated list of webhook delivery attempts, including status and response details.
      tags:
      - Tenant Portal
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
          minimum: 0
      - name: status
        in: query
        schema:
          type: string
          enum:
          - delivered
          - failed
          - pending
        description: Filter by delivery status.
      - name: event_type
        in: query
        schema:
          type: string
        description: Filter by event type (e.g. transfer.completed).
      responses:
        '200':
          description: Webhook deliveries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deliveries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        event_type:
                          type: string
                          example: transfer.completed
                        status:
                          type: string
                          enum:
                          - delivered
                          - failed
                          - pending
                          example: delivered
                        url:
                          type: string
                          format: uri
                        http_status:
                          type: integer
                          example: 200
                        response_time_ms:
                          type: integer
                          example: 150
                        attempt_count:
                          type: integer
                          example: 1
                        last_attempted_at:
                          type: string
                          format: date-time
                        created_at:
                          type: string
                          format: date-time
                  total_count:
                    type: integer
                    example: 1250
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /webhooks/providers/{providerId}:
    post:
      operationId: receiveProviderWebhook
      summary: Receive provider webhook
      description: Endpoint for receiving inbound webhooks from payment providers. Authenticated via HMAC-SHA256 signature.
        The payload is normalized and published to the internal processing queue.
      tags:
      - Webhooks
      security: []
      parameters:
      - name: providerId
        in: path
        required: true
        schema:
          type: string
        description: Provider identifier.
        example: stripe
      - name: x-webhook-signature
        in: header
        required: true
        schema:
          type: string
        description: HMAC-SHA256 signature of the request body.
      - name: x-webhook-timestamp
        in: header
        required: true
        schema:
          type: string
        description: Unix timestamp when the webhook was sent. Used for replay protection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw provider webhook payload. Structure varies by provider.
              additionalProperties: true
      responses:
        '200':
          description: Webhook received and queued for processing.
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Basic liveness probe. Returns 200 if the service is running.
      tags:
      - Health
      security: []
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /ready:
    get:
      operationId: readinessCheck
      summary: Readiness check
      description: Readiness probe. Checks gRPC backend and Redis connectivity. Returns 200 only if all dependencies are healthy.
      tags:
      - Health
      security: []
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                    - ok
                    - not_ready
                    example: ok
                  checks:
                    type: object
                    properties:
                      grpc:
                        type: string
                        enum:
                        - ok
                        - error
                        example: ok
                      redis:
                        type: string
                        enum:
                        - ok
                        - error
                        example: ok
        '503':
          description: Service is not ready.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: not_ready
                  checks:
                    type: object
                    properties:
                      grpc:
                        type: string
                      redis:
                        type: string
  /v1/ledger/accounts:
    get:
      operationId: listAccounts
      summary: List ledger accounts
      description: List all ledger accounts for the authenticated tenant. Accounts follow a hierarchical code structure.
      tags:
      - Ledger
      security:
      - BearerAuth: []
      parameters:
      - name: page_size
        in: query
        schema:
          type: integer
          default: 20
          maximum: 100
      - name: page_token
        in: query
        schema:
          type: string
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
                  next_page_token:
                    type: string
                  total_count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/ledger/balance/{accountCode}:
    get:
      operationId: getAccountBalance
      summary: Get account balance
      description: Get the current balance of a specific ledger account. Balances are sourced from TigerBeetle.
      tags:
      - Ledger
      security:
      - BearerAuth: []
      parameters:
      - name: accountCode
        in: path
        required: true
        schema:
          type: string
        description: Hierarchical account code (URL-encoded)
        example: tenant:korapay:assets:bank:gbp:clearing
      responses:
        '200':
          description: Account balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/ledger/transactions:
    get:
      operationId: listAccountTransactions
      summary: List account transactions
      description: List journal entry lines for an account with optional date range filtering.
      tags:
      - Ledger
      security:
      - BearerAuth: []
      parameters:
      - name: account_code
        in: query
        required: true
        schema:
          type: string
        description: Account code to query
      - name: from
        in: query
        schema:
          type: string
          format: date-time
        description: Start of date range
      - name: to
        in: query
        schema:
          type: string
          format: date-time
        description: End of date range
      - name: page_size
        in: query
        schema:
          type: integer
          default: 20
          maximum: 100
      - name: page_token
        in: query
        schema:
          type: string
      responses:
        '200':
          description: List of journal entry lines
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/JournalEntryLine'
                  next_page_token:
                    type: string
                  total_count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: 'API key (e.g. `sk_live_xxx` or `sk_test_xxx`) or JWT access token from login. Pass as `Authorization:
        Bearer <token>`.'
    OpsAuth:
      type: apiKey
      in: header
      name: X-Ops-Api-Key
      description: Operations API key for internal/admin endpoints.
  schemas:
    Error:
      type: object
      description: Standard error response.
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code.
              example: VALIDATION_ERROR
            message:
              type: string
              description: Human-readable error description.
              example: The source_amount field must be a positive decimal.
            details:
              type: object
              description: Additional error context. Structure varies by error type.
              additionalProperties: true
          required:
          - code
          - message
      required:
      - error
    Quote:
      type: object
      description: An FX quote for a cross-border transfer.
      properties:
        id:
          type: string
          format: uuid
          description: Unique quote identifier.
          example: a1b2c3d4-e5f6-7890-abcd-ef0123456789
        tenant_id:
          type: string
          format: uuid
          example: c3d4e5f6-7890-1234-abcd-ef0123456789
        source_currency:
          type: string
          example: GBP
        source_amount:
          type: string
          description: Quoted source amount. Decimal string.
          example: '1000.00'
        dest_currency:
          type: string
          example: NGN
        dest_amount:
          type: string
          description: Estimated destination amount after fees and FX. Decimal string.
          example: '1850000.00'
        fx_rate:
          type: string
          description: Applied exchange rate. Decimal string.
          example: '1875.50'
        fees:
          $ref: '#/components/schemas/FeeBreakdown'
        route:
          $ref: '#/components/schemas/RouteInfo'
        expires_at:
          type: string
          format: date-time
          description: Quote expiration time (UTC).
          example: '2024-03-15T14:35:00Z'
        created_at:
          type: string
          format: date-time
          example: '2024-03-15T14:30:00Z'
    FeeBreakdown:
      type: object
      description: Breakdown of fees applied to a transfer or quote.
      properties:
        on_ramp_fee:
          type: string
          description: Fee for converting fiat to stablecoin. Decimal string (USD).
          example: '2.50'
        network_fee:
          type: string
          description: Blockchain network fee. Decimal string (USD).
          example: '0.50'
        off_ramp_fee:
          type: string
          description: Fee for converting stablecoin to destination fiat. Decimal string (USD).
          example: '3.00'
        total_fee_usd:
          type: string
          description: Total fees in USD. Decimal string.
          example: '6.00'
    RouteInfo:
      type: object
      description: Selected settlement route details.
      properties:
        chain:
          type: string
          description: Blockchain network used for settlement.
          example: tron
        stable_coin:
          type: string
          description: Stablecoin used for settlement.
          example: USDT
        on_ramp_provider:
          type: string
          description: Provider for fiat-to-crypto conversion.
          example: settla_onramp
        off_ramp_provider:
          type: string
          description: Provider for crypto-to-fiat conversion.
          example: settla_offramp
        estimated_time_min:
          type: integer
          description: Estimated settlement time in minutes.
          example: 3
        explorer_url:
          type: string
          format: uri
          description: Blockchain explorer URL template.
          example: https://tronscan.org/#/transaction/
        alternative_routes:
          type: array
          description: Alternative routes that were considered.
          items:
            $ref: '#/components/schemas/RouteAlternative'
    RouteAlternative:
      type: object
      description: An alternative settlement route.
      properties:
        chain:
          type: string
          example: ethereum
        stable_coin:
          type: string
          example: USDC
        estimated_fee_usd:
          type: string
          example: '12.00'
        estimated_time_min:
          type: integer
          example: 5
    Transfer:
      type: object
      description: A cross-border transfer moving funds from source to destination via stablecoin rails.
      properties:
        id:
          type: string
          format: uuid
          example: b2c3d4e5-f678-9012-bcde-f01234567890
        tenant_id:
          type: string
          format: uuid
          example: c3d4e5f6-7890-1234-abcd-ef0123456789
        external_ref:
          type: string
          description: Client-provided external reference.
          example: INV-2024-0042
        idempotency_key:
          type: string
          example: txn_20240315_001
        status:
          type: string
          enum:
          - CREATED
          - FUNDED
          - ON_RAMPING
          - SETTLING
          - OFF_RAMPING
          - COMPLETED
          - FAILED
          - REFUNDING
          - REFUNDED
          description: Current transfer status.
          example: COMPLETED
        version:
          type: integer
          description: Optimistic concurrency version. Incremented on each state transition.
          example: 7
        source_currency:
          type: string
          example: GBP
        source_amount:
          type: string
          description: Source amount. Decimal string.
          example: '1000.00'
        dest_currency:
          type: string
          example: NGN
        dest_amount:
          type: string
          description: Destination amount. Decimal string.
          example: '1850000.00'
        stable_coin:
          type: string
          description: Stablecoin used for settlement.
          example: USDT
        stable_amount:
          type: string
          description: Stablecoin amount. Decimal string.
          example: '1270.50'
        chain:
          type: string
          description: Blockchain used for settlement.
          example: tron
        fx_rate:
          type: string
          description: Applied FX rate. Decimal string.
          example: '1875.50'
        fees:
          $ref: '#/components/schemas/FeeBreakdown'
        sender:
          $ref: '#/components/schemas/Sender'
        recipient:
          $ref: '#/components/schemas/Recipient'
        quote_id:
          type: string
          format: uuid
          description: Quote ID if a quote was used.
        blockchain_txs:
          type: array
          description: Blockchain transactions associated with this transfer.
          items:
            $ref: '#/components/schemas/BlockchainTx'
        created_at:
          type: string
          format: date-time
          example: '2024-03-15T14:30:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2024-03-15T14:33:45Z'
        funded_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          example: '2024-03-15T14:33:45Z'
        failed_at:
          type: string
          format: date-time
        failure_reason:
          type: string
          description: Human-readable failure reason (only set when status is FAILED).
        failure_code:
          type: string
          description: Machine-readable failure code.
    TransferEvent:
      type: object
      description: A state transition event in a transfer's lifecycle.
      properties:
        id:
          type: string
          format: uuid
          example: e1f2a3b4-c5d6-7890-1234-567890abcdef
        transfer_id:
          type: string
          format: uuid
          example: b2c3d4e5-f678-9012-bcde-f01234567890
        from_status:
          type: string
          description: Status before the transition.
          example: ON_RAMPING
        to_status:
          type: string
          description: Status after the transition.
          example: SETTLING
        occurred_at:
          type: string
          format: date-time
          example: '2024-03-15T14:31:20Z'
        provider_ref:
          type: string
          description: Provider reference associated with this event.
        metadata:
          type: object
          description: Additional event metadata.
          additionalProperties: true
    Sender:
      type: object
      description: Sender details for a transfer.
      properties:
        id:
          type: string
          description: Client-side sender identifier.
          example: user_12345
        name:
          type: string
          example: John Smith
        email:
          type: string
          format: email
          example: john@example.com
        country:
          type: string
          minLength: 2
          maxLength: 2
          example: GB
    Recipient:
      type: object
      description: Recipient bank account details. Either `sort_code` (UK) or `iban` (SEPA/international) should be provided,
        not both.
      required:
      - name
      - account_number
      - bank_name
      - country
      properties:
        name:
          type: string
          example: Adebayo Ogunlesi
        account_number:
          type: string
          example: 0123456789
        sort_code:
          type: string
          description: UK sort code (6 digits). Mutually exclusive with iban.
          example: 12-34-56
        bank_name:
          type: string
          example: First Bank of Nigeria
        country:
          type: string
          minLength: 2
          maxLength: 2
          example: NG
        iban:
          type: string
          description: International Bank Account Number. Mutually exclusive with sort_code.
          example: DE89370400440532013000
    BlockchainTx:
      type: object
      description: A blockchain transaction associated with a transfer.
      properties:
        chain:
          type: string
          example: tron
        type:
          type: string
          description: Transaction type (e.g. on_ramp, settlement, off_ramp).
          example: settlement
        tx_hash:
          type: string
          example: a1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456
        explorer_url:
          type: string
          format: uri
          example: https://tronscan.org/#/transaction/a1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456
        status:
          type: string
          enum:
          - pending
          - confirmed
          - failed
          example: confirmed
    Position:
      type: object
      description: A treasury position representing a currency balance at a specific location.
      properties:
        id:
          type: string
          format: uuid
          example: d4e5f678-9012-3456-bcde-f01234567890
        tenant_id:
          type: string
          format: uuid
          example: c3d4e5f6-7890-1234-abcd-ef0123456789
        currency:
          type: string
          example: USDT
        location:
          type: string
          description: Position location (chain or banking rail).
          example: tron
        balance:
          type: string
          description: Total balance (locked + available). Decimal string.
          example: '150000.00'
        locked:
          type: string
          description: Amount locked for in-flight transfers. Decimal string.
          example: '25000.00'
        available:
          type: string
          description: Available balance (balance - locked). Decimal string.
          example: '125000.00'
        min_balance:
          type: string
          description: Minimum balance threshold for alerts. Decimal string.
          example: '10000.00'
        target_balance:
          type: string
          description: Target balance for rebalancing. Decimal string.
          example: '100000.00'
        updated_at:
          type: string
          format: date-time
          example: '2024-03-15T14:30:00Z'
    PositionTransaction:
      type: object
      description: A treasury position transaction (top-up or withdrawal).
      properties:
        id:
          type: string
          format: uuid
          example: f1e2d3c4-b5a6-7890-1234-567890abcdef
        tenant_id:
          type: string
          format: uuid
        type:
          type: string
          enum:
          - topup
          - withdrawal
          example: topup
        currency:
          type: string
          example: USDT
        location:
          type: string
          example: tron
        amount:
          type: string
          description: Transaction amount. Decimal string.
          example: '50000.00'
        status:
          type: string
          enum:
          - PENDING
          - PROCESSING
          - COMPLETED
          - FAILED
          example: COMPLETED
        method:
          type: string
          enum:
          - bank_transfer
          - crypto
          - internal
          example: crypto
        destination:
          type: string
          description: Destination address (for withdrawals).
        reference:
          type: string
          description: Transaction reference.
        failure_reason:
          type: string
        created_at:
          type: string
          format: date-time
          example: '2024-03-15T14:30:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2024-03-15T14:32:00Z'
    PositionEvent:
      type: object
      description: An audit event for a treasury position.
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef0123456789
        position_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        event_type:
          type: string
          enum:
          - CREDIT
          - DEBIT
          - RESERVE
          - RELEASE
          - COMMIT
          - CONSUME
          description: Type of position event.
          example: RESERVE
        amount:
          type: string
          description: Event amount. Decimal string.
          example: '1500.00'
        balance_after:
          type: string
          description: Position balance after the event. Decimal string.
          example: '148500.00'
        locked_after:
          type: string
          description: Locked amount after the event. Decimal string.
          example: '26500.00'
        reference_id:
          type: string
          format: uuid
          description: ID of the entity that triggered this event (e.g. transfer ID).
        reference_type:
          type: string
          description: Type of the reference entity.
          example: transfer
        recorded_at:
          type: string
          format: date-time
          example: '2024-03-15T14:30:05Z'
    LiquidityReport:
      type: object
      description: Aggregated liquidity report for a tenant.
      properties:
        tenant_id:
          type: string
          format: uuid
        positions:
          type: array
          items:
            $ref: '#/components/schemas/Position'
        total_available:
          type: object
          description: Total available balance per currency.
          additionalProperties:
            type: string
          example:
            USDT: '250000.00'
            USDC: '75000.00'
            GBP: '50000.00'
        alert_positions:
          type: array
          description: Positions below minimum balance threshold.
          items:
            $ref: '#/components/schemas/Position'
        generated_at:
          type: string
          format: date-time
          example: '2024-03-15T14:30:00Z'
    DepositSession:
      type: object
      description: A crypto deposit session for receiving on-chain stablecoin payments.
      properties:
        id:
          type: string
          format: uuid
          example: f1e2d3c4-b5a6-7890-1234-567890abcdef
        tenant_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - PENDING_PAYMENT
          - DETECTED
          - CONFIRMED
          - CREDITING
          - CREDITED
          - SETTLING
          - SETTLED
          - HELD
          - EXPIRED
          - FAILED
          - CANCELLED
          description: Deposit session status.
          example: PENDING_PAYMENT
        chain:
          type: string
          example: tron
        token:
          type: string
          example: USDT
        deposit_address:
          type: string
          description: On-chain deposit address. Send funds here.
          example: TXkR2Gp9s4K7f1yD8m3Nz6v2Bw5xQ7xN3
        expected_amount:
          type: string
          description: Expected deposit amount. Decimal string.
          example: '5000.00'
        received_amount:
          type: string
          description: Amount received on-chain. Decimal string.
          example: '0.00'
        currency:
          type: string
          description: Target fiat currency for auto-conversion.
          example: NGN
        fee_amount:
          type: string
          description: Fee charged. Decimal string.
          example: '5.00'
        net_amount:
          type: string
          description: Net amount after fees. Decimal string.
          example: '4995.00'
        settlement_pref:
          type: string
          enum:
          - AUTO_CONVERT
          - HOLD
          - THRESHOLD
          example: AUTO_CONVERT
        expires_at:
          type: string
          format: date-time
          example: '2024-03-15T15:30:00Z'
        created_at:
          type: string
          format: date-time
          example: '2024-03-15T14:30:00Z'
        updated_at:
          type: string
          format: date-time
        detected_at:
          type: string
          format: date-time
        confirmed_at:
          type: string
          format: date-time
        credited_at:
          type: string
          format: date-time
        settled_at:
          type: string
          format: date-time
        failure_reason:
          type: string
        failure_code:
          type: string
    BankDepositSession:
      type: object
      description: A fiat bank deposit session using a virtual bank account.
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef0123456789
        tenant_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - PENDING_PAYMENT
          - PAYMENT_RECEIVED
          - CREDITING
          - CREDITED
          - SETTLING
          - SETTLED
          - HELD
          - EXPIRED
          - FAILED
          - CANCELLED
          - UNDERPAID
          - OVERPAID
          example: PENDING_PAYMENT
        account_number:
          type: string
          description: Virtual bank account number for receiving the deposit.
          example: '12345678'
        account_name:
          type: string
          example: Settla / Acme Payments
        sort_code:
          type: string
          example: 04-00-04
        iban:
          type: string
        account_type:
          type: string
          enum:
          - PERMANENT
          - TEMPORARY
          example: TEMPORARY
        currency:
          type: string
          example: GBP
        expected_amount:
          type: string
          description: Expected deposit amount. Decimal string.
          example: '25000.00'
        received_amount:
          type: string
          description: Amount received from bank. Decimal string.
          example: '0.00'
        fee_amount:
          type: string
          example: '0.00'
        net_amount:
          type: string
          example: '0.00'
        mismatch_policy:
          type: string
          enum:
          - ACCEPT
          - REJECT
          example: ACCEPT
        settlement_pref:
          type: string
          enum:
          - AUTO_CONVERT
          - HOLD
          - THRESHOLD
        payer_name:
          type: string
          description: Name of the payer (populated after payment receipt).
        payer_reference:
          type: string
          description: Reference provided by the payer.
        bank_reference:
          type: string
          description: Bank-generated transaction reference.
        expires_at:
          type: string
          format: date-time
          example: '2024-03-16T14:30:00Z'
        created_at:
          type: string
          format: date-time
          example: '2024-03-15T14:30:00Z'
        updated_at:
          type: string
          format: date-time
        payment_received_at:
          type: string
          format: date-time
        failure_reason:
          type: string
        failure_code:
          type: string
    VirtualAccount:
      type: object
      description: A virtual bank account for receiving fiat deposits.
      properties:
        id:
          type: string
          format: uuid
          example: b2c3d4e5-f678-9012-bcde-f01234567890
        tenant_id:
          type: string
          format: uuid
        banking_partner_id:
          type: string
          description: Banking partner that issued the account.
        account_number:
          type: string
          example: '12345678'
        account_name:
          type: string
          example: Settla / Acme Payments
        sort_code:
          type: string
          example: 04-00-04
        iban:
          type: string
        currency:
          type: string
          example: GBP
        account_type:
          type: string
          enum:
          - PERMANENT
          - TEMPORARY
          example: PERMANENT
        available:
          type: boolean
          description: Whether the account is active and available for deposits.
          example: true
        created_at:
          type: string
          format: date-time
          example: '2024-01-10T09:00:00Z'
    PaymentLink:
      type: object
      description: A shareable payment link for merchant collections.
      properties:
        id:
          type: string
          format: uuid
          example: c3d4e5f6-7890-1234-abcd-ef0123456789
        tenant_id:
          type: string
          format: uuid
        short_code:
          type: string
          description: Short code for the payment link URL.
          example: pay_abc123
        description:
          type: string
          example: 'Invoice #INV-2024-0042'
        redirect_url:
          type: string
          format: uri
          example: https://acmepay.com/payment/success
        status:
          type: string
          enum:
          - ACTIVE
          - EXPIRED
          - DISABLED
          example: ACTIVE
        amount:
          type: string
          description: Payment amount. Decimal string.
          example: '100.00'
        currency:
          type: string
          example: USD
        chain:
          type: string
          example: tron
        token:
          type: string
          example: USDT
        settlement_pref:
          type: string
          enum:
          - AUTO_CONVERT
          - HOLD
          - THRESHOLD
        use_limit:
          type: integer
          description: Maximum redemptions. Null means unlimited.
        use_count:
          type: integer
          description: Number of times redeemed.
          example: 0
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
          example: '2024-03-15T14:30:00Z'
        updated_at:
          type: string
          format: date-time
    Tenant:
      type: object
      description: Tenant profile with configuration, fee schedule, and KYB status.
      properties:
        id:
          type: string
          format: uuid
          example: c3d4e5f6-7890-1234-abcd-ef0123456789
        company_name:
          type: string
          example: Acme Payments Ltd
        display_name:
          type: string
          example: Acme Pay
        slug:
          type: string
          example: acme-payments
        email:
          type: string
          format: email
          example: admin@acmepay.com
        kyb_status:
          type: string
          enum:
          - pending
          - approved
          - rejected
          - under_review
          example: approved
        webhook_url:
          type: string
          format: uri
          example: https://api.acmepay.com/webhooks/settla
        settlement_model:
          type: string
          enum:
          - INSTANT
          - DAILY_NET
          - WEEKLY_NET
          example: DAILY_NET
        fees:
          $ref: '#/components/schemas/FeeSchedule'
        limits:
          type: object
          properties:
            max_single_transfer_usd:
              type: string
              example: '1000000.00'
            daily_volume_limit_usd:
              type: string
              example: '10000000.00'
            max_pending_transfers:
              type: integer
              example: 5000
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    FeeSchedule:
      type: object
      description: Per-tenant fee schedule in basis points.
      properties:
        on_ramp_bps:
          type: integer
          description: On-ramp fee in basis points (1 bp = 0.01%).
          example: 40
        off_ramp_bps:
          type: integer
          description: Off-ramp fee in basis points.
          example: 35
        network_fee_usd:
          type: string
          description: Flat network fee in USD. Decimal string.
          example: '0.50'
    APIKey:
      type: object
      description: An API key for authenticating API requests. The full key is only shown at creation.
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef0123456789
        key_prefix:
          type: string
          description: First characters of the key, for identification.
          example: sk_live_abc123
        name:
          type: string
          example: Production Server
        environment:
          type: string
          enum:
          - live
          - test
          example: live
        created_at:
          type: string
          format: date-time
          example: '2024-03-01T10:00:00Z'
        last_used_at:
          type: string
          format: date-time
          description: When the key was last used for authentication.
    DashboardMetrics:
      type: object
      description: Aggregated metrics for the tenant dashboard.
      properties:
        transfers_today:
          type: integer
          example: 142
        volume_today_usd:
          type: string
          description: Today's total transfer volume in USD. Decimal string.
          example: '875000.00'
        success_rate_7d:
          type: number
          format: float
          description: 7-day transfer success rate (0.0 to 1.0).
          example: 0.985
        avg_completion_time_ms:
          type: integer
          description: Average transfer completion time in milliseconds (7-day).
          example: 65000
        total_fees_today_usd:
          type: string
          description: Total fees collected today in USD. Decimal string.
          example: '3500.00'
        active_deposits:
          type: integer
          description: Number of active deposit sessions.
          example: 5
        treasury_available_usd:
          type: string
          description: Total available treasury balance in USD. Decimal string.
          example: '325000.00'
        pending_transfers:
          type: integer
          description: Number of in-flight transfers.
          example: 23
    RoutingOption:
      type: object
      description: A scored routing option for a currency pair.
      properties:
        provider:
          type: string
          description: On-ramp provider.
          example: settla_onramp
        off_ramp_provider:
          type: string
          description: Off-ramp provider.
          example: settla_offramp
        chain:
          type: string
          example: tron
        stablecoin:
          type: string
          example: USDT
        score:
          type: number
          format: float
          description: Overall route score (0.0 to 1.0). Higher is better.
          example: 0.92
        estimated_fee_usd:
          type: string
          description: Estimated total fee in USD. Decimal string.
          example: '6.00'
        estimated_settlement_seconds:
          type: integer
          description: Estimated settlement time in seconds.
          example: 180
        score_breakdown:
          $ref: '#/components/schemas/ScoreBreakdown'
    ScoreBreakdown:
      type: object
      description: Breakdown of the route scoring components.
      properties:
        cost:
          type: number
          format: float
          description: 'Cost score component (weight: 40%).'
          example: 0.95
        speed:
          type: number
          format: float
          description: 'Speed score component (weight: 30%).'
          example: 0.9
        liquidity:
          type: number
          format: float
          description: 'Liquidity score component (weight: 20%).'
          example: 0.88
        reliability:
          type: number
          format: float
          description: 'Reliability score component (weight: 10%).'
          example: 0.95
    Account:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Account UUID
          example: acc-12345678-abcd-1234-efgh-123456789012
        tenant_id:
          type: string
          format: uuid
          description: Tenant UUID (empty for system accounts)
        code:
          type: string
          description: Hierarchical account code
          example: tenant:korapay:assets:bank:gbp:clearing
        name:
          type: string
          description: Human-readable account name
          example: Korapay GBP Clearing
        type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - REVENUE
          - EXPENSE
          description: Account type
        currency:
          type: string
          description: Account currency
          example: GBP
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AccountBalance:
      type: object
      properties:
        account_code:
          type: string
          description: Hierarchical account code
          example: tenant:korapay:assets:bank:gbp:clearing
        balance:
          type: string
          description: Current balance (decimal string)
          example: '150000.00'
        currency:
          type: string
          example: GBP
    JournalEntryLine:
      type: object
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        account_code:
          type: string
          example: tenant:korapay:assets:bank:gbp:clearing
        entry_type:
          type: string
          enum:
          - DEBIT
          - CREDIT
        amount:
          type: string
          description: Always positive; direction determined by entry_type
          example: '1000.00'
        currency:
          type: string
          example: GBP
        description:
          type: string
          example: GBP→NGN transfer settlement
  responses:
    BadRequest:
      description: The request was malformed or contains invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: VALIDATION_ERROR
              message: The source_amount field must be a positive decimal string.
    Unauthorized:
      description: Authentication failed. The API key is missing, invalid, or expired.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: Invalid or missing API key.
    Forbidden:
      description: The authenticated tenant does not have permission to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: FORBIDDEN
              message: Insufficient permissions for this operation.
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: Transfer not found.
    Conflict:
      description: The request conflicts with existing state (e.g. duplicate idempotency key, invalid state transition).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: CONFLICT
              message: A transfer with this idempotency key already exists.
    UnprocessableEntity:
      description: The request was well-formed but semantically invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNPROCESSABLE_ENTITY
              message: Insufficient treasury balance for this transfer.
    TooManyRequests:
      description: Rate limit exceeded. Retry after the indicated period.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: RATE_LIMITED
              message: Rate limit exceeded. Try again in 30 seconds.
    InternalServerError:
      description: An unexpected error occurred. Contact support if the issue persists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: INTERNAL_ERROR
              message: An unexpected error occurred. Please try again.
    ServiceUnavailable:
      description: The service is temporarily unavailable (e.g. during maintenance or overload).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: SERVICE_UNAVAILABLE
              message: Service temporarily unavailable. Please retry.
