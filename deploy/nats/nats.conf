# NATS Server Configuration — Settla Dev
# Single node with JetStream for local development.
#
# Production: 3-node cluster. See nats-cluster.conf for reference.

listen: 0.0.0.0:4222
http_port: 8222

# Max payload per message (1MB supports large transfer events with metadata)
max_payload: 1048576

jetstream {
  store_dir: /data
  max_mem: 512MB
  max_file: 2GB
}

# Logging
debug: false
trace: false
logtime: true

