# Production: 3-node TigerBeetle cluster with Raft consensus
#
# Each pod uses its StatefulSet ordinal (0, 1, 2) as the TigerBeetle replica
# index. An init container formats the data file on first run, embedding the
# full cluster membership so TigerBeetle knows its peers at startup.
#
# Peer DNS follows the StatefulSet headless service pattern:
#   tigerbeetle-{0,1,2}.tigerbeetle.settla.svc.cluster.local:3001
#
# TigerBeetle cluster invariant: all nodes must be formatted with the same
# --cluster flag value (0) and the complete --addresses list. The replica index
# passed to `format` identifies which address slot this node owns.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tigerbeetle
  namespace: settla
spec:
  replicas: 3
  # podManagementPolicy: Parallel would start all 3 pods simultaneously, but
  # OrderedReady is safer for the first-run format step — pod-0 formats and
  # becomes ready before pod-1 starts, avoiding a race on the shared quorum.
  podManagementPolicy: OrderedReady
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tigerbeetle
        app.kubernetes.io/component: ledger-engine
        app.kubernetes.io/part-of: settla
    spec:
      terminationGracePeriodSeconds: 60

      # ---------------------------------------------------------------------------
      # Init container: format the data file on first run.
      # The data file is only absent on a brand-new PVC. If the file already
      # exists, the format command exits with a non-zero code, so we tolerate
      # that with `|| true` to keep the init container idempotent.
      # ---------------------------------------------------------------------------
      initContainers:
        - name: tigerbeetle-format
          image: ghcr.io/tigerbeetle/tigerbeetle:0.16.44
          command:
            - sh
            - -c
            - |
              set -e
              # Derive this pod's zero-based replica index from the StatefulSet
              # pod name suffix (e.g. "tigerbeetle-2" → index 2).
              REPLICA_INDEX="${HOSTNAME##*-}"

              DATA_FILE="/data/${REPLICA_INDEX}_0.tigerbeetle"

              if [ ! -f "${DATA_FILE}" ]; then
                echo "Formatting TigerBeetle data file: ${DATA_FILE} (replica ${REPLICA_INDEX})"
                /tigerbeetle format \
                  --cluster=0 \
                  --replica="${REPLICA_INDEX}" \
                  --replica-count=3 \
                  "${DATA_FILE}"
                echo "Format complete."
              else
                echo "Data file ${DATA_FILE} already exists — skipping format."
              fi
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

      # ---------------------------------------------------------------------------
      # Main container: start TigerBeetle with all peer addresses.
      # --addresses lists all 3 nodes in order (index 0 first, then 1, 2).
      # TigerBeetle uses the replica index embedded in the data file to know
      # which address slot it owns; it binds to 0.0.0.0:3001 and uses the
      # StatefulSet DNS names to reach peers.
      # ---------------------------------------------------------------------------
      containers:
        - name: tigerbeetle
          image: ghcr.io/tigerbeetle/tigerbeetle:0.16.44
          command:
            - sh
            - -c
            - |
              set -e
              REPLICA_INDEX="${HOSTNAME##*-}"
              DATA_FILE="/data/${REPLICA_INDEX}_0.tigerbeetle"
              exec /tigerbeetle start \
                --addresses=tigerbeetle-0.tigerbeetle.settla.svc.cluster.local:3001,tigerbeetle-1.tigerbeetle.settla.svc.cluster.local:3001,tigerbeetle-2.tigerbeetle.settla.svc.cluster.local:3001 \
                "${DATA_FILE}"
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 3001
              name: tb
              protocol: TCP
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

      # Spread the 3 TigerBeetle pods across distinct availability zones so
      # the loss of any single zone does not break the Raft quorum (2-of-3).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: tigerbeetle
      affinity:
        podAntiAffinity:
          # Hard rule: never place two TB pods on the same node.
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - tigerbeetle
              topologyKey: kubernetes.io/hostname

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd   # NVMe-backed StorageClass required in production
        resources:
          requests:
            storage: 500Gi           # Headroom for 50M tx/day; resize as needed
