# =============================================================================
# NATS JetStream Cluster Configuration — Settla Production (3-Node)
# =============================================================================
#
# Production reference config for a 3-node NATS JetStream cluster deployed
# as a Kubernetes StatefulSet. This file is intended to be mounted as a
# ConfigMap value.
#
# Local development uses the single-node nats.conf in this same directory
# (started via docker-compose). Do NOT use this file for local dev.
#
# Deployment:
#   - StatefulSet: nats (3 replicas)
#   - Headless Service: nats-headless.settla.svc.cluster.local
#   - Pod DNS: nats-{0,1,2}.nats-headless.settla.svc.cluster.local
#
# Each pod resolves its own server_name from the NATS_SERVER_NAME env var
# (set via the downward API or StatefulSet ordinal).
# =============================================================================

# ---- Server Identity ----
# Set via environment variable or K8s downward API:
#   NATS_SERVER_NAME=nats-0  (or nats-1, nats-2)
# server_name: $NATS_SERVER_NAME

# ---- Client Connections ----
listen: 0.0.0.0:4222
max_payload: 8388608        # 8MB — accommodates large transfer payloads with metadata
max_connections: 10000       # Supports 6+ settla-server + 8+ settla-node replicas + headroom

# ---- HTTP Monitoring ----
http_port: 8222

# ---- Cluster ----
cluster {
  name: settla-nats
  listen: 0.0.0.0:6222

  routes = [
    nats-route://nats-0.nats-headless.settla.svc.cluster.local:6222
    nats-route://nats-1.nats-headless.settla.svc.cluster.local:6222
    nats-route://nats-2.nats-headless.settla.svc.cluster.local:6222
  ]

  # Cluster will auto-exclude its own route from the list
  connect_retries: 30

  # ---- Cluster TLS (enable for production) ----
  # tls {
  #   cert_file:  /etc/nats/certs/cluster/tls.crt
  #   key_file:   /etc/nats/certs/cluster/tls.key
  #   ca_file:    /etc/nats/certs/cluster/ca.crt
  #   verify:     true
  #   timeout:    5
  # }
}

# ---- JetStream ----
jetstream {
  store_dir: /data/jetstream

  # Memory store: used for mirror/source caching and R1 streams
  max_mem: 1GB

  # File store: primary durable storage for all 7 Settla streams
  # Sized for 7-day retention at 50M messages/day (~350M messages total)
  max_file: 50GB

  # Domain isolation (optional, useful for super-cluster topologies)
  # domain: settla
}

# ---- Client TLS (enable for production) ----
# tls {
#   cert_file:  /etc/nats/certs/server/tls.crt
#   key_file:   /etc/nats/certs/server/tls.key
#   ca_file:    /etc/nats/certs/server/ca.crt
#   verify:     true
#   timeout:    5
# }

# ---- Authorization (enable for production) ----
# Use NATS NKey or JWT-based auth in production. Basic token shown as placeholder.
#
# authorization {
#   token: $NATS_AUTH_TOKEN
#
#   # Or use multi-user with permissions:
#   # users = [
#   #   {
#   #     user: settla-server
#   #     password: $NATS_SERVER_PASSWORD
#   #     permissions: {
#   #       publish: { allow: "settla.>" }
#   #       subscribe: { allow: "settla.>" }
#   #     }
#   #   }
#   #   {
#   #     user: settla-node
#   #     password: $NATS_NODE_PASSWORD
#   #     permissions: {
#   #       publish: { allow: "settla.>" }
#   #       subscribe: { allow: "settla.>" }
#   #     }
#   #   }
#   #   {
#   #     user: monitoring
#   #     password: $NATS_MONITORING_PASSWORD
#   #     permissions: {
#   #       subscribe: { allow: "$SYS.>" }
#   #     }
#   #   }
#   # ]
# }

# ---- Logging ----
debug: false
trace: false
logtime: true
log_size_limit: 104857600    # 100MB log rotation

# ---- System Account (for monitoring and admin) ----
# accounts {
#   $SYS {
#     users = [
#       { user: admin, password: $NATS_ADMIN_PASSWORD }
#     ]
#   }
# }

# ---- Limits ----
max_control_line: 4096       # Max protocol control line length
ping_interval: 20            # Seconds between server pings
ping_max: 3                  # Max missed pings before disconnect
write_deadline: 10s          # Max time to write to a slow consumer
