# Redis Sentinel StatefulSet — 3 instances for quorum-based failover.
#
# Five-nines rationale: Sentinel is the control plane for Redis HA.
# Three instances form a quorum (2 of 3 must agree) to prevent split-brain.
# Sentinel detects master failure within 5 seconds (down-after-milliseconds)
# and completes failover within 10 seconds (failover-timeout), keeping
# total Redis unavailability under 15 seconds per incident.
#
# Sentinel instances are separated from Redis data nodes so that a resource
# contention issue on a data node cannot impair the failover control plane.
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: settla-redis-sentinel
  namespace: settla
  labels:
    app.kubernetes.io/name: redis-sentinel
    app.kubernetes.io/component: cache
spec:
  replicas: 3
  serviceName: settla-redis-sentinel-headless
  podManagementPolicy: Parallel  # Sentinels are peers, start simultaneously
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-sentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-sentinel
        app.kubernetes.io/component: cache
    spec:
      terminationGracePeriodSeconds: 15
      # Spread across nodes — Sentinel must survive any single node failure
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: redis-sentinel
              topologyKey: kubernetes.io/hostname
      initContainers:
        # Copy sentinel config to a writable location.
        # Sentinel modifies its own config file at runtime (records current
        # master, known replicas, etc.) so it cannot use a read-only ConfigMap
        # mount directly.
        - name: init-sentinel
          image: redis:7-alpine
          command:
            - /bin/sh
            - -c
            - |
              cp /mnt/config/sentinel.conf /mnt/data/sentinel.conf
          volumeMounts:
            - name: config
              mountPath: /mnt/config
            - name: sentinel-data
              mountPath: /mnt/data
      containers:
        - name: sentinel
          image: redis:7-alpine
          command: ["redis-sentinel", "/data/sentinel.conf"]
          ports:
            - containerPort: 26379
              name: sentinel
          resources:
            # Sentinel is lightweight — it only monitors and coordinates
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: sentinel-data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "redis-cli -p 26379 ping | grep -q PONG"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "redis-cli -p 26379 ping | grep -q PONG"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: redis-config
        - name: sentinel-data
          emptyDir: {}
