version: "2"
sql:
  # Transfer DB
  - engine: "postgresql"
    queries: "queries/transfer/"
    schema: "migrations/transfer/"
    gen:
      go:
        package: "transferdb"
        out: "../store/transferdb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "numeric"
            go_type:
              import: "github.com/shopspring/decimal"
              type: "Decimal"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"

  # Ledger DB
