apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: settla
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: settla
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: settla
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: grafana
          image: grafana/grafana:11.0.0
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            # Grafana admin password sourced from settla-app-secrets ExternalSecret.
            # AWS Secrets Manager path: settla/production/app → grafana-admin-password
            # Add this key to the JSON in AWS Secrets Manager and to settla-app-secrets.yaml.
            # For local dev, the development overlay secrets.yaml sets a placeholder value.
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: settla-app-secrets
                  key: grafana-admin-password
            - name: GF_SERVER_ROOT_URL
              value: "http://grafana:3000"
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}  # Use PVC in production for dashboard persistence
