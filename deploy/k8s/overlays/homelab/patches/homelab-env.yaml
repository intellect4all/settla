# Homelab environment: mock providers, no artificial delay, info logging.
# DB URLs go through in-cluster PgBouncer which proxies to external MacBook Postgres.
# TigerBeetle address points to external MacBook directly.
apiVersion: v1
kind: ConfigMap
metadata:
  name: settla-server-config
data:
  SETTLA_LOG_LEVEL: "info"
  SETTLA_PROVIDER_MODE: "mock"
  SETTLA_MOCK_DELAY_MS: "0"
  SETTLA_PPROF: "true"
  SETTLA_PPROF_PORT: "6060"
  SETTLA_ENV: "homelab"
  # DB URLs via in-cluster PgBouncer (PgBouncer proxies to external MacBook Postgres)
  SETTLA_LEDGER_DB_URL: "postgres://settla:$(POSTGRES_LEDGER_PASSWORD)@pgbouncer-ledger:6432/settla_ledger?sslmode=disable"
  SETTLA_TRANSFER_DB_URL: "postgres://settla:$(POSTGRES_TRANSFER_PASSWORD)@pgbouncer-transfer:6432/settla_transfer?sslmode=disable"
  SETTLA_TREASURY_DB_URL: "postgres://settla:$(POSTGRES_TREASURY_PASSWORD)@pgbouncer-treasury:6432/settla_treasury?sslmode=disable"
  # TigerBeetle on MacBook — replace with actual IP at deploy time
  SETTLA_TIGERBEETLE_ADDRESSES: "${MACBOOK_1_IP}:3001"
  # Redis and NATS are in-cluster
  SETTLA_REDIS_URL: "redis://redis:6379"
  SETTLA_NATS_URL: "nats://nats:4222"
  # Tuning for 580 TPS on 3 replicas (~193 TPS each)
  SETTLA_TREASURY_FLUSH_INTERVAL_MS: "100"
  SETTLA_LEDGER_BATCH_WINDOW_MS: "10"
  SETTLA_LEDGER_BATCH_MAX_SIZE: "500"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: settla-node-config
data:
  SETTLA_LOG_LEVEL: "info"
  SETTLA_PROVIDER_MODE: "mock"
  SETTLA_MOCK_DELAY_MS: "0"
  SETTLA_ENV: "homelab"
  # 6 partitions across 3 replicas = 2 partitions per node instance
  SETTLA_NODE_PARTITIONS: "6"
  # DB URLs via in-cluster PgBouncer
  SETTLA_LEDGER_DB_URL: "postgres://settla:$(POSTGRES_LEDGER_PASSWORD)@pgbouncer-ledger:6432/settla_ledger?sslmode=disable"
  SETTLA_TRANSFER_DB_URL: "postgres://settla:$(POSTGRES_TRANSFER_PASSWORD)@pgbouncer-transfer:6432/settla_transfer?sslmode=disable"
  SETTLA_TREASURY_DB_URL: "postgres://settla:$(POSTGRES_TREASURY_PASSWORD)@pgbouncer-treasury:6432/settla_treasury?sslmode=disable"
  # TigerBeetle on MacBook
  SETTLA_TIGERBEETLE_ADDRESSES: "${MACBOOK_1_IP}:3001"
  # In-cluster services
  SETTLA_REDIS_URL: "redis://redis:6379"
  SETTLA_NATS_URL: "nats://nats:4222"
  # Worker pools: tuned down from cluster config (32→24) to match 3 replicas
  SETTLA_WORKER_POOL_TRANSFER: "12"
  SETTLA_WORKER_POOL_PROVIDER: "24"
  SETTLA_WORKER_POOL_BLOCKCHAIN: "12"
  SETTLA_WORKER_POOL_LEDGER: "12"
  SETTLA_WORKER_POOL_TREASURY: "12"
  SETTLA_WORKER_POOL_WEBHOOK: "24"
  SETTLA_WORKER_POOL_INBOUND_WH: "8"
  SETTLA_RELAY_BATCH_SIZE: "500"
  SETTLA_RELAY_POLL_INTERVAL_MS: "20"
  # Tuning
  SETTLA_TREASURY_FLUSH_INTERVAL_MS: "100"
  SETTLA_LEDGER_BATCH_WINDOW_MS: "10"
  SETTLA_LEDGER_BATCH_MAX_SIZE: "500"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
data:
  SETTLA_LOG_LEVEL: "info"
  SETTLA_GRPC_POOL_SIZE: "50"
  SETTLA_REDIS_URL: "redis://redis:6379"
  SETTLA_ENV: "homelab"
  SETTLA_RATE_LIMIT_PER_TENANT: "10000"
  SETTLA_LOAD_SHED_MAX_CONCURRENT: "10000"
  SETTLA_LOAD_SHED_TARGET_LATENCY_MS: "1000"
  SETTLA_LOAD_SHED_INITIAL_LIMIT: "5000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-config
data:
  SETTLA_LOG_LEVEL: "info"
  SETTLA_ENV: "homelab"
  SETTLA_NATS_URL: "nats://nats:4222"
  SETTLA_REDIS_URL: "redis://redis:6379"
  SETTLA_TRANSFER_DB_URL: "postgres://settla:$(POSTGRES_TRANSFER_PASSWORD)@pgbouncer-transfer:6432/settla_transfer?sslmode=disable"
