# ExternalSecret — database credentials
#
# Maps AWS Secrets Manager path `settla/production/db` → K8s Secret
# `settla-db-credentials` (consumed by Patroni StatefulSets and PgBouncer).
#
# AWS Secrets Manager path to create:
#   Name:    settla/production/db
#   Type:    Other (plain JSON)
#   Value:
#     {
#       "postgres-superuser-password": "<strong-random-password>",
#       "postgres-replication-password": "<strong-random-password>",
#       "postgres-transfer-password": "<strong-random-password>",
#       "postgres-ledger-password": "<strong-random-password>",
#       "postgres-treasury-password": "<strong-random-password>"
#     }
#
# How to create in AWS CLI:
#   aws secretsmanager create-secret \
#     --name settla/production/db \
#     --region eu-west-1 \
#     --secret-string '{
#       "postgres-superuser-password": "CHANGE_ME",
#       "postgres-replication-password": "CHANGE_ME",
#       "postgres-transfer-password": "CHANGE_ME",
#       "postgres-ledger-password": "CHANGE_ME",
#       "postgres-treasury-password": "CHANGE_ME"
#     }'
#
# Consumed by:
#   - infrastructure/patroni/statefulset.yaml  (secretKeyRef: patroni-credentials)
#   - infrastructure/pgbouncer/deployment.yaml (secretKeyRef: settla-db-credentials)
#   - base/settla-server/deployment.yaml       (env: POSTGRES_*_PASSWORD)
#   - base/settla-node/statefulset.yaml        (env: POSTGRES_*_PASSWORD)
#   - base/webhook/deployment.yaml             (env: POSTGRES_TRANSFER_PASSWORD)
#
# NOTE: The Patroni StatefulSet references the secret as `patroni-credentials`
# while application deployments reference it as `settla-db-credentials`.
# Both names are created below from the same AWS secret.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: settla-db-credentials
  labels:
    app.kubernetes.io/name: settla-db-credentials
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: settla
spec:
  # Sync every 1 hour. Reduce to 5m if you rotate secrets frequently.
  refreshInterval: 1h
  secretStoreRef:
    name: settla-aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: settla-db-credentials
    creationPolicy: Owner
    # Immutable prevents accidental overwrites of the synced secret.
    immutable: false
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: settla-db-credentials
          app.kubernetes.io/component: secrets
          app.kubernetes.io/part-of: settla
  data:
    # Patroni superuser (postgres admin, used for cluster bootstrap)
    - secretKey: superuser-password
      remoteRef:
        key: settla/production/db
        property: postgres-superuser-password
    # Patroni streaming replication user
    - secretKey: replication-password
      remoteRef:
        key: settla/production/db
        property: postgres-replication-password
    # Per-database application passwords — used in PgBouncer and app connection strings
    - secretKey: transfer-password
      remoteRef:
        key: settla/production/db
        property: postgres-transfer-password
    - secretKey: ledger-password
      remoteRef:
        key: settla/production/db
        property: postgres-ledger-password
    - secretKey: treasury-password
      remoteRef:
        key: settla/production/db
        property: postgres-treasury-password
---
# Alias secret named `patroni-credentials` so Patroni StatefulSets can use
# the canonical name they already reference without YAML changes.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: patroni-credentials
  labels:
    app.kubernetes.io/name: patroni-credentials
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: settla
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: settla-aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: patroni-credentials
    creationPolicy: Owner
    immutable: false
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: patroni-credentials
          app.kubernetes.io/component: secrets
          app.kubernetes.io/part-of: settla
  data:
    - secretKey: superuser-password
      remoteRef:
        key: settla/production/db
        property: postgres-superuser-password
    - secretKey: replication-password
      remoteRef:
        key: settla/production/db
        property: postgres-replication-password
    - secretKey: transfer-password
      remoteRef:
        key: settla/production/db
        property: postgres-transfer-password
    - secretKey: ledger-password
      remoteRef:
        key: settla/production/db
        property: postgres-ledger-password
    - secretKey: treasury-password
      remoteRef:
        key: settla/production/db
        property: postgres-treasury-password
