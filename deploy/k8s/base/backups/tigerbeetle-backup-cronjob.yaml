apiVersion: batch/v1
kind: CronJob
metadata:
  name: tigerbeetle-backup
  namespace: settla
  labels:
    app.kubernetes.io/name: tigerbeetle-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: settla
  annotations:
    # Schedule: hourly — matches docs/disaster-recovery.md TigerBeetle backup strategy.
    # Copies the data file from the shared PVC (same node as the TigerBeetle pod),
    # compresses it, and uploads to S3. Retention: 72 hours.
    #
    # IMPORTANT — volume access strategy:
    # The backup pod requests the same PVC as tigerbeetle-0 in ReadOnlyMany mode.
    # Not all storage classes support ReadOnlyMany; for ReadWriteOnce storage, deploy
    # this CronJob on the SAME node as tigerbeetle-0 via nodeAffinity + nodeName.
    # The production overlay patch sets the correct nodeAffinity.
    settla.io/backup-type: "tigerbeetle-snapshot"
    settla.io/retention: "72h"
    settla.io/rpo: "1h"
spec:
  # Every hour at minute 30 (offset from the top of the hour to spread I/O load).
  schedule: "30 * * * *"

  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  # Skip if a previous backup is still running (large data file copy).
  concurrencyPolicy: Forbid

  # Start within 30 minutes of scheduled time or skip.
  startingDeadlineSeconds: 1800

  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: tigerbeetle-backup
        app.kubernetes.io/component: backup
        app.kubernetes.io/part-of: settla
    spec:
      backoffLimit: 1
      # 2 hours max: copy (large file) + gzip + S3 upload.
      activeDeadlineSeconds: 7200
      ttlSecondsAfterFinished: 86400

      template:
        metadata:
          labels:
            app.kubernetes.io/name: tigerbeetle-backup
            app.kubernetes.io/component: backup
            app.kubernetes.io/part-of: settla
          annotations:
            prometheus.io/scrape: "false"
        spec:
          restartPolicy: OnFailure
          serviceAccountName: settla-backup

          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            seccompProfile:
              type: RuntimeDefault

          # Node affinity: co-locate with tigerbeetle-0 so the PVC is accessible.
          # The production overlay overrides this with the actual node name or label.
          # For multi-replica (3-node) clusters, target the follower replica to avoid
          # impacting the leader during the file copy.
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: tigerbeetle
                    topologyKey: kubernetes.io/hostname

          volumes:
            - name: backup-scripts
              configMap:
                name: backup-scripts
                defaultMode: 0755
            - name: tmp
              emptyDir:
                sizeLimit: "50Gi"  # TigerBeetle data file can be large
            # TigerBeetle data volume — mounted read-only.
            # The PVC name follows the StatefulSet volumeClaimTemplate pattern:
            #   data-tigerbeetle-0
            # For ReadWriteOnce PVCs, the production overlay must set nodeName
            # to match the tigerbeetle-0 pod's node (or use a CSI snapshot instead).
            - name: tigerbeetle-data
              persistentVolumeClaim:
                claimName: data-tigerbeetle-0
                readOnly: true

          containers:
            - name: tigerbeetle-backup
              image: ghcr.io/intellect4all/settla-backup-tools:latest
              imagePullPolicy: IfNotPresent

              command: ["/bin/bash", "/scripts/tigerbeetle-backup.sh"]

              resources:
                requests:
                  cpu: "500m"
                  memory: "512Mi"
                limits:
                  cpu: "2"
                  memory: "2Gi"

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]

              volumeMounts:
                - name: backup-scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
                - name: tigerbeetle-data
                  mountPath: /data
                  readOnly: true

              env:
                - name: ENVIRONMENT
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: ENVIRONMENT
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: S3_BUCKET
                - name: S3_PREFIX
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: TB_S3_PREFIX
                - name: TB_DATA_FILE
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: TB_DATA_FILE
                - name: TB_REPLICA_INDEX
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: TB_REPLICA_INDEX
                - name: RETENTION_HOURS
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: TB_RETENTION_HOURS
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: SLACK_WEBHOOK_URL
                      optional: true
                - name: PAGERDUTY_ROUTING_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: PAGERDUTY_ROUTING_KEY
                      optional: true
                - name: AWS_REGION
                  value: "us-east-1"
                - name: AWS_DEFAULT_REGION
                  value: "us-east-1"
