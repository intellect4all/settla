syntax = "proto3";

package settla.v1;

option go_package = "github.com/intellect4all/settla/gen/settla/v1;settlav1";

// ──────────────────────────────────────────────────────────────────────────────
// PortalAuthService — self-service tenant registration and authentication
// ──────────────────────────────────────────────────────────────────────────────

service PortalAuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc SubmitKYB(SubmitKYBRequest) returns (SubmitKYBResponse);
  rpc ApproveKYB(ApproveKYBRequest) returns (ApproveKYBResponse);
}

// ──────────────────────────────────────────────────────────────────────────────
// Register — create a new tenant + owner user
// ──────────────────────────────────────────────────────────────────────────────

message RegisterRequest {
  string company_name = 1;
  string email = 2;
  string password = 3;
  string display_name = 4;
}

message RegisterResponse {
  string tenant_id = 1;          // UUID
  string user_id = 2;            // UUID
  string email = 3;
  string message = 4;            // "Check your email for verification"
}

// ──────────────────────────────────────────────────────────────────────────────
// Login — authenticate portal user, return JWT tokens
// ──────────────────────────────────────────────────────────────────────────────

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;       // JWT (15 min expiry)
  string refresh_token = 2;      // JWT (7 day expiry)
  int64 expires_in = 3;          // Seconds until access token expires
  PortalUserProfile user = 4;
}

message PortalUserProfile {
  string id = 1;                  // UUID
  string email = 2;
  string display_name = 3;
  string role = 4;                // OWNER, ADMIN, MEMBER
  string tenant_id = 5;          // UUID
  string tenant_name = 6;
  string tenant_slug = 7;
  string tenant_status = 8;      // ACTIVE, SUSPENDED, ONBOARDING
  string kyb_status = 9;         // PENDING, IN_REVIEW, VERIFIED, REJECTED
}

// ──────────────────────────────────────────────────────────────────────────────
// VerifyEmail — confirm email address via token
// ──────────────────────────────────────────────────────────────────────────────

message VerifyEmailRequest {
  string token = 1;              // Raw token from email link
}

message VerifyEmailResponse {
  string message = 1;            // "Email verified successfully"
}

// ──────────────────────────────────────────────────────────────────────────────
// RefreshToken — exchange refresh token for new access token
// ──────────────────────────────────────────────────────────────────────────────

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;       // New JWT (15 min expiry)
  int64 expires_in = 2;          // Seconds until access token expires
}

// ──────────────────────────────────────────────────────────────────────────────
// SubmitKYB — tenant submits KYB documentation
// ──────────────────────────────────────────────────────────────────────────────

message SubmitKYBRequest {
  string tenant_id = 1;                  // UUID — from JWT claims
  string company_registration_number = 2;
  string country = 3;                    // ISO 3166-1 alpha-2
  string business_type = 4;             // fintech, bank, payment_processor, other
  string contact_name = 5;
  string contact_email = 6;
  string contact_phone = 7;
}

message SubmitKYBResponse {
  string message = 1;            // "KYB submitted for review"
  string kyb_status = 2;        // IN_REVIEW
}

// ──────────────────────────────────────────────────────────────────────────────
// ApproveKYB — admin approves tenant KYB (internal use)
// ──────────────────────────────────────────────────────────────────────────────

message ApproveKYBRequest {
  string tenant_id = 1;         // UUID
}

message ApproveKYBResponse {
  string message = 1;           // "KYB approved, tenant is now ACTIVE"
  string tenant_status = 2;     // ACTIVE
  string kyb_status = 3;        // VERIFIED
}
