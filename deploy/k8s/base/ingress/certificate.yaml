apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: settla-tls
spec:
  # Secret name must match the secretName in ingress.yaml tls section
  secretName: settla-tls
  duration: 2160h    # 90 days (Let's Encrypt maximum)
  renewBefore: 360h  # Renew 15 days before expiry
  subject:
    organizations:
      - Settla
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
    - api.settla.example.com
  # ClusterIssuer reference — overridden in production overlay to use letsencrypt-production
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
    group: cert-manager.io
