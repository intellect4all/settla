apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-verify
  namespace: settla
  labels:
    app.kubernetes.io/name: backup-verify
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: settla
  annotations:
    # Schedule: daily at 06:00 UTC (4 hours after the backup job completes).
    # Downloads the latest pg_dump for each database, restores it into a throwaway
    # PostgreSQL instance, and verifies row counts against configured minimums.
    # Alerts via Slack and PagerDuty on any failure.
    #
    # Prerequisites:
    #   - A lightweight "restore-test" PostgreSQL instance accessible at VERIFY_PG_HOST
    #     (set in backup-config ConfigMap). In production: a dedicated db.t3.medium RDS
    #     instance named postgres-verify that is kept warm and idle outside this window.
    #   - The settla-backup ServiceAccount must have s3:GetObject on the S3 bucket.
    settla.io/backup-type: "restore-verification"
    settla.io/schedule: "daily-06:00-UTC"
spec:
  # 06:00 UTC — 4 hours after the 02:00 UTC backup, well within the 30-day window.
  schedule: "0 6 * * *"

  successfulJobsHistoryLimit: 7   # keep a week of verification results
  failedJobsHistoryLimit: 3

  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 7200   # 2 hour grace window

  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: backup-verify
        app.kubernetes.io/component: backup
        app.kubernetes.io/part-of: settla
    spec:
      # No retries — if the restore test fails once, alert immediately.
      backoffLimit: 0
      # 4 hours max: download (3 DBs) + restore + verify + cleanup.
      activeDeadlineSeconds: 14400
      ttlSecondsAfterFinished: 604800  # keep finished pod 7 days for log review

      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup-verify
            app.kubernetes.io/component: backup
            app.kubernetes.io/part-of: settla
          annotations:
            prometheus.io/scrape: "false"
        spec:
          restartPolicy: Never   # Never retry — a failed verify must be investigated
          serviceAccountName: settla-backup

          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            seccompProfile:
              type: RuntimeDefault

          volumes:
            - name: backup-scripts
              configMap:
                name: backup-scripts
                defaultMode: 0755
            - name: tmp
              emptyDir:
                sizeLimit: "30Gi"  # headroom for three uncompressed pg_dumps

          initContainers:
            # Wait for the restore-test Postgres to be reachable before starting.
            # Avoids confusing "connection refused" errors in the main container logs.
            - name: wait-for-postgres
              image: ghcr.io/intellect4all/settla-backup-tools:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  echo "Waiting for postgres-verify to be ready ..."
                  until PGPASSWORD="${VERIFY_PG_PASSWORD}" pg_isready \
                    --host="${VERIFY_PG_HOST}" \
                    --port="${VERIFY_PG_PORT}" \
                    --username="${VERIFY_PG_USER}"; do
                    echo "Not ready yet — retrying in 5s ..."
                    sleep 5
                  done
                  echo "postgres-verify is ready."
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              env:
                - name: VERIFY_PG_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: VERIFY_PG_HOST
                - name: VERIFY_PG_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: VERIFY_PG_PORT
                - name: VERIFY_PG_USER
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: VERIFY_PG_USER
                - name: VERIFY_PG_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: VERIFY_PG_PASSWORD

          containers:
            - name: backup-verify
              image: ghcr.io/intellect4all/settla-backup-tools:latest
              imagePullPolicy: IfNotPresent

              command: ["/bin/bash", "/scripts/backup-verify.sh"]

              resources:
                requests:
                  cpu: "500m"
                  memory: "512Mi"
                limits:
                  cpu: "2"
                  memory: "4Gi"

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]

              volumeMounts:
                - name: backup-scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp

              env:
                - name: ENVIRONMENT
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: ENVIRONMENT
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: S3_BUCKET
                - name: S3_PREFIX
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: POSTGRES_VERIFY_S3_PREFIX
                - name: VERIFY_PG_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: VERIFY_PG_HOST
                - name: VERIFY_PG_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: VERIFY_PG_PORT
                - name: VERIFY_PG_USER
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: VERIFY_PG_USER
                - name: MIN_ROWS_LEDGER
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: MIN_ROWS_LEDGER
                - name: MIN_ROWS_TRANSFER
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: MIN_ROWS_TRANSFER
                - name: MIN_ROWS_TREASURY
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: MIN_ROWS_TREASURY
                - name: VERIFY_PG_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: VERIFY_PG_PASSWORD
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: SLACK_WEBHOOK_URL
                      optional: true
                - name: PAGERDUTY_ROUTING_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: PAGERDUTY_ROUTING_KEY
                      optional: true
                - name: AWS_REGION
                  value: "us-east-1"
                - name: AWS_DEFAULT_REGION
                  value: "us-east-1"
