      tags:
      - Tenant Portal
      responses:
        '200':
          description: Tenant profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      operationId: updateTenant
      summary: Update tenant profile
      description: Updates the authenticated tenant's configurable settings.
      tags:
      - Tenant Portal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                webhook_url:
                  type: string
                  format: uri
                  description: URL for receiving webhook notifications.
                  example: https://api.acmepay.com/webhooks/settla
                settlement_model:
                  type: string
                  enum:
                  - INSTANT
                  - DAILY_NET
                  - WEEKLY_NET
                  description: Settlement model preference.
                  example: DAILY_NET
      responses:
        '200':
          description: Tenant profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/me/dashboard:
    get:
      operationId: getDashboardMetrics
      summary: Get dashboard metrics
      description: Returns aggregated metrics for the tenant dashboard, including recent activity, volume, and key performance
        indicators.
      tags:
      - Tenant Portal
      responses:
        '200':
          description: Dashboard metrics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardMetrics'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/me/api-keys:
    get:
      operationId: listApiKeys
      summary: List API keys
      description: Returns all API keys for the authenticated tenant. Keys are masked except for the prefix.
      tags:
      - Tenant Portal
      responses:
        '200':
          description: API keys.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/APIKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createApiKey
      summary: Create an API key
      description: Creates a new API key. The full key value is returned only in this response and cannot be retrieved later.
      tags:
      - Tenant Portal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - environment
              properties:
                name:
                  type: string
                  description: Human-readable name for the key.
                  example: Production Server
                environment:
                  type: string
                  enum:
                  - live
                  - test
                  description: Environment scope for the key.
                  example: live
      responses:
        '201':
          description: API key created. The `key` field contains the full key and is shown only once.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    example: a1b2c3d4-e5f6-7890-abcd-ef0123456789
                  key:
                    type: string
                    description: Full API key. Shown only once at creation time. Store securely.
                    example: sk_live_EXAMPLE_KEY_DO_NOT_USE_000000000000
                  key_prefix:
                    type: string
                    example: sk_live_abc123
                  name:
                    type: string
                    example: Production Server
                  environment:
                    type: string
                    example: live
                  created_at:
                    type: string
                    format: date-time
                    example: '2024-03-15T14:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/me/api-keys/{keyId}:
    delete:
      operationId: deleteApiKey
      summary: Delete an API key
      description: Permanently revokes and deletes an API key. This action cannot be undone.
      tags:
      - Tenant Portal
      parameters:
      - name: keyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: API key deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/me/api-keys/{keyId}/rotate:
    post:
      operationId: rotateApiKey
      summary: Rotate an API key
      description: Rotates an API key, generating a new secret while keeping the same key ID. The old key is immediately invalidated.
      tags:
      - Tenant Portal
      parameters:
      - name: keyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: API key rotated. New key shown only once.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  key:
                    type: string
                    description: New full API key. Shown only once.
                    example: sk_live_EXAMPLE_NEW_KEY_DO_NOT_USE_00000000
                  key_prefix:
                    type: string
                    example: sk_live_new123
                  name:
                    type: string
                  environment:
                    type: string
                  created_at:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/me/webhooks:
    get:
      operationId: getWebhookConfig
      summary: Get webhook configuration
      description: Returns the tenant's current webhook configuration including URL and subscribed events.
      tags:
      - Tenant Portal
      responses:
        '200':
          description: Webhook configuration.
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                    example: https://api.acmepay.com/webhooks/settla
                  events:
                    type: array
                    items:
                      type: string
                    description: List of subscribed event types. Empty array means all events.
                    example:
                    - transfer.completed
                    - transfer.failed
                    - deposit.credited
                  signing_secret_prefix:
                    type: string
                    description: First 8 characters of the webhook signing secret.
                    example: whsec_ab
                  active:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      operationId: updateWebhookConfig
      summary: Update webhook configuration
      description: Updates the tenant's webhook URL and subscribed events.
      tags:
      - Tenant Portal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - url
              properties:
                url:
                  type: string
                  format: uri
                  description: Webhook delivery URL. Must be HTTPS.
                  example: https://api.acmepay.com/webhooks/settla
                events:
                  type: array
                  items:
                    type: string
                  description: Event types to subscribe to. Empty or omitted means all events.
                  example:
                  - transfer.completed
                  - transfer.failed
      responses:
        '200':
          description: Webhook configuration updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                  events:
                    type: array
                    items:
                      type: string
                  signing_secret_prefix:
                    type: string
                  active:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/me/webhooks/test:
    post:
      operationId: testWebhook
      summary: Send a test webhook
      description: Sends a test webhook event to the configured URL to verify connectivity and signature validation.
