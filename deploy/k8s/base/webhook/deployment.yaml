apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook
  labels:
    app.kubernetes.io/name: webhook
    app.kubernetes.io/component: webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: webhook
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhook
        app.kubernetes.io/component: webhook
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: webhook
      containers:
        - name: webhook
          image: settla-webhook:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            periodSeconds: 2
            failureThreshold: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]  # Drain in-flight webhook deliveries
          envFrom:
            - configMapRef:
                name: webhook-config
          env:
            # DB password injected from the settla-db-credentials ExternalSecret.
            # ConfigMap SETTLA_TRANSFER_DB_URL uses $(POSTGRES_PASSWORD) substitution.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: settla-db-credentials
                  key: app-password
            # Per-tenant HMAC-SHA256 secrets for outbound webhook signatures.
            # Sourced from the settla-webhook-secrets ExternalSecret.
            - name: LEMFI_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: settla-webhook-secrets
                  key: lemfi-webhook-secret
            - name: FINCRA_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: settla-webhook-secrets
                  key: fincra-webhook-secret
            - name: PAYSTACK_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: settla-webhook-secrets
                  key: paystack-webhook-secret
                  optional: true
            - name: NODE_ENV
              value: "production"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook
  labels:
    app.kubernetes.io/name: webhook
    app.kubernetes.io/component: webhook
