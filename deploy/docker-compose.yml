# ==========================================================================
# LOCAL DEVELOPMENT ONLY — do not use these defaults in production/staging.
# All passwords and secrets below are intentionally weak dev-only values.
# Production credentials are injected via External Secrets Operator (ESO)
# from AWS Secrets Manager — see deploy/k8s/base/secrets/.
# ==========================================================================

services:
  # ── PostgreSQL (one per bounded context) ─────────────────────────
  # Raw Postgres ports exposed for migrations and direct admin access.
  # Application traffic goes through PgBouncer (see below).

  postgres-ledger:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=400"]
    environment:
      POSTGRES_DB: settla_ledger
      POSTGRES_USER: ${POSTGRES_USER:-settla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-settla}
      SETTLA_APP_DB_PASSWORD: ${SETTLA_APP_DB_PASSWORD:-settla_app}
    ports:
      - "5433:5432"
    volumes:
      - pgdata-ledger:/var/lib/postgresql/data
      - ./docker/init-rls-role.sh:/docker-entrypoint-initdb.d/init-rls-role.sh:ro
    networks:
      - settla-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-settla} -d settla_ledger"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G

  postgres-transfer:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=400"]
    environment:
      POSTGRES_DB: settla_transfer
      POSTGRES_USER: ${POSTGRES_USER:-settla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-settla}
      SETTLA_APP_DB_PASSWORD: ${SETTLA_APP_DB_PASSWORD:-settla_app}
    ports:
      - "5434:5432"
    volumes:
      - pgdata-transfer:/var/lib/postgresql/data
      - ./docker/init-rls-role.sh:/docker-entrypoint-initdb.d/init-rls-role.sh:ro
    networks:
      - settla-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-settla} -d settla_transfer"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G

  postgres-treasury:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=400"]
    environment:
      POSTGRES_DB: settla_treasury
      POSTGRES_USER: ${POSTGRES_USER:-settla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-settla}
      SETTLA_APP_DB_PASSWORD: ${SETTLA_APP_DB_PASSWORD:-settla_app}
    ports:
      - "5435:5432"
    volumes:
      - pgdata-treasury:/var/lib/postgresql/data
      - ./docker/init-rls-role.sh:/docker-entrypoint-initdb.d/init-rls-role.sh:ro
    networks:
      - settla-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-settla} -d settla_treasury"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M

  # ── PgBouncer (connection pooling per bounded context) ──────────
  # Production: 10+ settla-server replicas × 200 conns = 2,000+ client conns
  # PgBouncer pools these to ~200 actual Postgres connections per DB.
  # pool_mode=transaction: connections released back to pool after each transaction.

  pgbouncer-ledger:
    image: edoburu/pgbouncer:1.21.0-p2
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-ledger:5432/settla_ledger
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 600
      MIN_POOL_SIZE: 50
      RESERVE_POOL_SIZE: 20
      RESERVE_POOL_TIMEOUT: 5
      SERVER_IDLE_TIMEOUT: 300
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      AUTH_TYPE: scram-sha-256
    ports:
      - "6433:5432"
    networks:
      - settla-net
    depends_on:
      postgres-ledger:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  pgbouncer-transfer:
    image: edoburu/pgbouncer:1.21.0-p2
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-transfer:5432/settla_transfer
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 600
      MIN_POOL_SIZE: 50
      RESERVE_POOL_SIZE: 20
      RESERVE_POOL_TIMEOUT: 5
      SERVER_IDLE_TIMEOUT: 300
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      AUTH_TYPE: scram-sha-256
    ports:
      - "6434:5432"
    networks:
      - settla-net
    depends_on:
      postgres-transfer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  pgbouncer-treasury:
    image: edoburu/pgbouncer:1.21.0-p2
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-treasury:5432/settla_treasury
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 600
      MIN_POOL_SIZE: 50
      RESERVE_POOL_SIZE: 20
      RESERVE_POOL_TIMEOUT: 5
      SERVER_IDLE_TIMEOUT: 300
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      AUTH_TYPE: scram-sha-256
    ports:
      - "6435:5432"
    networks:
      - settla-net
    depends_on:
      postgres-treasury:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── TigerBeetle (ledger write authority) ────────────────────────
  # TigerBeetle handles 1M+ TPS for double-entry balance mutations.
  # It is the source of truth for account balances.
  # Postgres ledger tables are the CQRS read model, populated by a sync consumer.
  #
  # Production: clusterable with 3+ replicas for fault tolerance.
  # Dev: single node, cluster_id=0.

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.11
    # privileged required for io_uring on Docker Desktop (macOS/Windows).
    # Not needed on native Linux hosts with kernel 5.6+.
    privileged: true
    command:
      - "start"
      - "--addresses=0.0.0.0:3001"
      - "/data/0_0.tigerbeetle"
    ports:
      - "3001:3001"
    volumes:
      - tbdata:/data
    networks:
      - settla-net
    depends_on:
      tigerbeetle-init:
        condition: service_completed_successfully
    healthcheck:
      # TigerBeetle REPL connects and exits. Exit 0 = port reachable.
      test: ["CMD-SHELL", "echo '' | timeout 3 /tigerbeetle repl --cluster=0 --addresses=127.0.0.1:3001 2>&1 | grep -q 'connected to replica'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
        reservations:
          memory: 2G

  # Init container: creates the TigerBeetle data file if it doesn't exist.
  # Runs once, exits 0 on success. If file already exists, TB format exits 1
  # with "already formatted", so we use a shell wrapper to handle both cases.
  tigerbeetle-init:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.11
    privileged: true
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /data/0_0.tigerbeetle ]; then
          echo "TigerBeetle data file already exists, skipping format."
          exit 0
        fi
        /tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle
    volumes:
      - tbdata:/data
    networks:
      - settla-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── NATS with JetStream ────────────────────────────────────────
  # Single node for dev. Production config (3-node cluster) documented in
  # deploy/nats/nats-cluster.conf for reference.
  #
  # Streams are partitioned by tenant hash (8 partitions default) to allow
  # per-tenant ordering with cross-tenant parallelism.

  nats:
    image: nats:2.10-alpine
    command:
      - "--config=/etc/nats/nats.conf"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
    networks:
      - settla-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ── Redis ──────────────────────────────────────────────────────
  # Used for: quote cache, idempotency, rate limiting (L2), tenant config (L2).
  # L1 is an in-process local cache in gateway/settla-server (30s TTL).
  #
  # Production: 3-node Redis cluster.
  # Dev: single node, 2GB max.

  redis:
    image: redis:7.2-alpine
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:-settla-dev}"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--save"
      - "900 1"
      - "--save"
      - "300 10"
      - "--maxmemory"
      - "2gb"
      - "--maxmemory-policy"
      - "volatile-lru"
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    networks:
      - settla-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-settla-dev} --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"

  # ── Application services ───────────────────────────────────────
  # All DB URLs point to PgBouncer, NOT raw Postgres.

  settla-server:
    build:
      context: ..
      dockerfile: deploy/docker/settla-server.Dockerfile
    stop_grace_period: 30s
    ports:
      - "${SETTLA_SERVER_HTTP_PORT:-8081}:8080"
      - "${SETTLA_SERVER_GRPC_PORT:-9090}:9090"
      - "${SETTLA_PPROF_PORT:-6060}:6060"
    volumes:
      - ./config/features.json:/etc/settla/features.json:ro
    environment:
      SETTLA_FEATURE_FLAGS_PATH: /etc/settla/features.json
      # DB URLs connect directly to Postgres (pgx prepared statements work)
      # PgBouncer is used in production with session mode or dedicated adapters
      SETTLA_LEDGER_DB_URL: postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-ledger:5432/settla_ledger?sslmode=disable
      SETTLA_TRANSFER_DB_URL: postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-transfer:5432/settla_transfer?sslmode=disable
      SETTLA_TREASURY_DB_URL: postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-treasury:5432/settla_treasury?sslmode=disable
      # RLS-enforced pools disabled for local dev (settla_app role has SET LOCAL issues with PgBouncer)
      # SETTLA_TRANSFER_APP_DB_URL: postgres://settla_app:settla_app@postgres-transfer:5432/settla_transfer?sslmode=disable
      # SETTLA_LEDGER_APP_DB_URL: postgres://settla_app:settla_app@postgres-ledger:5432/settla_ledger?sslmode=disable
      # SETTLA_TREASURY_APP_DB_URL: postgres://settla_app:settla_app@postgres-treasury:5432/settla_treasury?sslmode=disable
      # SETTLA_TIGERBEETLE_ADDRESSES: tigerbeetle:3001
      # Re-enable once TB Go client address parsing is fixed (v0.16.11 bug).
      # Check: go list -m github.com/tigerbeetle/tigerbeetle-go
      # When re-enabled, remove the stub mode fallback in cmd/settla-server/main.go.
      SETTLA_REDIS_URL: redis://:${REDIS_PASSWORD:-settla-dev}@redis:6379
      SETTLA_NATS_URL: nats://nats:4222
      SETTLA_JWT_SECRET: ${SETTLA_JWT_SECRET:?SETTLA_JWT_SECRET must be set in .env}
      SETTLA_SERVER_HTTP_PORT: "8080"
      SETTLA_SERVER_GRPC_PORT: "9090"
      SETTLA_PPROF_PORT: "6060"
      SETTLA_PPROF: "${SETTLA_PPROF:-true}"
      SETTLA_TREASURY_FLUSH_INTERVAL_MS: "${SETTLA_TREASURY_FLUSH_INTERVAL_MS:-100}"
      SETTLA_LEDGER_BATCH_WINDOW_MS: "${SETTLA_LEDGER_BATCH_WINDOW_MS:-10}"
      SETTLA_LEDGER_BATCH_MAX_SIZE: "${SETTLA_LEDGER_BATCH_MAX_SIZE:-500}"
      SETTLA_MOCK_DELAY_MS: ${SETTLA_MOCK_DELAY_MS:-500}
      SETTLA_LOG_LEVEL: ${SETTLA_LOG_LEVEL:-debug}
      SETTLA_ENV: ${SETTLA_ENV:-development}
      # Provider mode: mock (default) | testnet (real blockchain) | live (future)
      SETTLA_PROVIDER_MODE: ${SETTLA_PROVIDER_MODE:-mock}
      # Wallet management (required for testnet mode)
      SETTLA_WALLET_ENCRYPTION_KEY: ${SETTLA_WALLET_ENCRYPTION_KEY:-}
      SETTLA_MASTER_SEED: ${SETTLA_MASTER_SEED:-}
      SETTLA_WALLET_STORAGE_PATH: ${SETTLA_WALLET_STORAGE_PATH:-/data/wallets}
      # Blockchain RPC URLs (testnet defaults)
      SETTLA_TRON_RPC_URL: ${SETTLA_TRON_RPC_URL:-https://nile.trongrid.io}
      SETTLA_TRON_API_KEY: ${SETTLA_TRON_API_KEY:-}
      SETTLA_ETHEREUM_RPC_URL: ${SETTLA_ETHEREUM_RPC_URL:-https://rpc.sepolia.org}
      SETTLA_BASE_RPC_URL: ${SETTLA_BASE_RPC_URL:-https://sepolia.base.org}
      SETTLA_SOLANA_RPC_URL: ${SETTLA_SOLANA_RPC_URL:-https://api.devnet.solana.com}
    networks:
      - settla-net
    depends_on:
      postgres-ledger:
        condition: service_healthy
      postgres-transfer:
        condition: service_healthy
      postgres-treasury:
        condition: service_healthy
      tigerbeetle:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4.0"
        reservations:
          memory: 512M

  settla-node:
    build:
      context: ..
      dockerfile: deploy/docker/settla-node.Dockerfile
    stop_grace_period: 30s
    ports:
      - "${SETTLA_NODE_METRICS_PORT:-9091}:9091"
    volumes:
      - ./config/features.json:/etc/settla/features.json:ro
    environment:
      SETTLA_FEATURE_FLAGS_PATH: /etc/settla/features.json
      SETTLA_NATS_URL: nats://nats:4222
      SETTLA_REDIS_URL: redis://:${REDIS_PASSWORD:-settla-dev}@redis:6379
      SETTLA_TRANSFER_DB_URL: postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-transfer:5432/settla_transfer?sslmode=disable
      SETTLA_LEDGER_DB_URL: postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-ledger:5432/settla_ledger?sslmode=disable
      SETTLA_TREASURY_DB_URL: postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-treasury:5432/settla_treasury?sslmode=disable
      SETTLA_NODE_PARTITIONS: "${SETTLA_NODE_PARTITIONS:-8}"
      SETTLA_NODE_METRICS_PORT: "9091"
      SETTLA_TREASURY_FLUSH_INTERVAL_MS: "${SETTLA_TREASURY_FLUSH_INTERVAL_MS:-100}"
      SETTLA_LEDGER_BATCH_WINDOW_MS: "${SETTLA_LEDGER_BATCH_WINDOW_MS:-10}"
      SETTLA_LEDGER_BATCH_MAX_SIZE: "${SETTLA_LEDGER_BATCH_MAX_SIZE:-500}"
      # Outbox relay tuning (peak burst capacity)
      SETTLA_RELAY_BATCH_SIZE: "${SETTLA_RELAY_BATCH_SIZE:-200}"
      SETTLA_RELAY_POLL_INTERVAL_MS: "${SETTLA_RELAY_POLL_INTERVAL_MS:-30}"
      # Worker pool sizes (tuned for 5K TPS peak)
      SETTLA_WORKER_POOL_TRANSFER: "${SETTLA_WORKER_POOL_TRANSFER:-8}"
      SETTLA_WORKER_POOL_PROVIDER: "${SETTLA_WORKER_POOL_PROVIDER:-16}"
      SETTLA_WORKER_POOL_BLOCKCHAIN: "${SETTLA_WORKER_POOL_BLOCKCHAIN:-16}"
      SETTLA_WORKER_POOL_LEDGER: "${SETTLA_WORKER_POOL_LEDGER:-8}"
      SETTLA_WORKER_POOL_TREASURY: "${SETTLA_WORKER_POOL_TREASURY:-8}"
      SETTLA_WORKER_POOL_WEBHOOK: "${SETTLA_WORKER_POOL_WEBHOOK:-32}"
      SETTLA_WORKER_POOL_INBOUND_WH: "${SETTLA_WORKER_POOL_INBOUND_WH:-8}"
      # In dev, single instance handles all partitions (PARTITION_ID not set).
      # In prod, run 8 instances each with SETTLA_NODE_PARTITION_ID=0..7.
      SETTLA_MOCK_DELAY_MS: ${SETTLA_MOCK_DELAY_MS:-500}
      SETTLA_LOG_LEVEL: ${SETTLA_LOG_LEVEL:-debug}
      SETTLA_ENV: ${SETTLA_ENV:-development}
      # Provider mode + blockchain RPC (same as settla-server)
      SETTLA_PROVIDER_MODE: ${SETTLA_PROVIDER_MODE:-mock}
      SETTLA_WALLET_ENCRYPTION_KEY: ${SETTLA_WALLET_ENCRYPTION_KEY:-}
      SETTLA_MASTER_SEED: ${SETTLA_MASTER_SEED:-}
      SETTLA_WALLET_STORAGE_PATH: ${SETTLA_WALLET_STORAGE_PATH:-/data/wallets}
      SETTLA_TRON_RPC_URL: ${SETTLA_TRON_RPC_URL:-https://nile.trongrid.io}
      SETTLA_TRON_API_KEY: ${SETTLA_TRON_API_KEY:-}
      SETTLA_ETHEREUM_RPC_URL: ${SETTLA_ETHEREUM_RPC_URL:-https://rpc.sepolia.org}
      SETTLA_BASE_RPC_URL: ${SETTLA_BASE_RPC_URL:-https://sepolia.base.org}
      SETTLA_SOLANA_RPC_URL: ${SETTLA_SOLANA_RPC_URL:-https://api.devnet.solana.com}
    networks:
      - settla-net
    depends_on:
      postgres-ledger:
        condition: service_healthy
      postgres-transfer:
        condition: service_healthy
      postgres-treasury:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4.0"
        reservations:
          memory: 512M

  gateway:
    build:
      context: ..
      dockerfile: deploy/docker/gateway.Dockerfile
    stop_grace_period: 30s
    ports:
      - "${SETTLA_GATEWAY_PORT:-3100}:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      SETTLA_REDIS_URL: redis://:${REDIS_PASSWORD:-settla-dev}@redis:6379
      SETTLA_SERVER_GRPC_URL: settla-server:9090
      SETTLA_SERVER_HTTP_URL: http://settla-server:${SETTLA_SERVER_HTTP_PORT:-8081}
      SETTLA_OPS_API_KEY: ${SETTLA_OPS_API_KEY:-settla-ops-secret-change-me}
      SETTLA_GRPC_POOL_SIZE: "${SETTLA_GRPC_POOL_SIZE:-50}"
      SETTLA_TENANT_CACHE_TTL_SECONDS: "${SETTLA_TENANT_CACHE_TTL_SECONDS:-30}"
      SETTLA_LOG_LEVEL: ${SETTLA_LOG_LEVEL:-debug}
      SETTLA_ENV: ${SETTLA_ENV:-development}
      SETTLA_JWT_SECRET: ${SETTLA_JWT_SECRET:?SETTLA_JWT_SECRET must be set in .env}
      SETTLA_RATE_LIMIT_PER_TENANT: "${SETTLA_RATE_LIMIT_PER_TENANT:-10000}"
      SETTLA_LOAD_SHED_MAX_CONCURRENT: "${SETTLA_LOAD_SHED_MAX_CONCURRENT:-5000}"
      SETTLA_LOAD_SHED_TARGET_LATENCY_MS: "${SETTLA_LOAD_SHED_TARGET_LATENCY_MS:-1000}"
      SETTLA_LOAD_SHED_INITIAL_LIMIT: "${SETTLA_LOAD_SHED_INITIAL_LIMIT:-2000}"
    networks:
      - settla-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"

  # ── Tyk API Gateway ────────────────────────────────────────────
  # Tyk handles infrastructure concerns (auth, rate limiting, circuit breaking)
  # and proxies to the Fastify BFF (gateway) for business logic.
  # External traffic enters via Tyk on port 8080.

  tyk-gateway:
    image: tykio/tyk-gateway:v5.3
    container_name: settla-tyk
    ports:
      - "${TYK_GATEWAY_PORT:-8090}:8080"
    volumes:
      - ./tyk/tyk.conf:/opt/tyk-gateway/tyk.conf
      - ./tyk/apps:/opt/tyk-gateway/apps
      - ./tyk/policies:/opt/tyk-gateway/policies
      - ./tyk/middleware:/opt/tyk-gateway/middleware
    environment:
      # CHANGE IN PRODUCTION: set TYK_SECRET to a strong random value.
      # Production K8s: injected from settla-app-secrets ExternalSecret (tyk-secret).
      # Generate: openssl rand -hex 32
      - TYK_GW_SECRET=${TYK_SECRET:-settla-tyk-secret}
      - TYK_GW_STORAGE_HOST=redis
      - TYK_GW_STORAGE_PORT=6379
      - TYK_GW_STORAGE_PASSWORD=${REDIS_PASSWORD:-settla-dev}
    depends_on:
      redis:
        condition: service_healthy
      gateway:
        condition: service_healthy
    networks:
      - settla-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/hello"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Observability ───────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "${SETTLA_PROMETHEUS_PORT:-9092}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - promdata:/prometheus
    networks:
      - settla-net
    depends_on:
      - settla-server
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=:9093"
    ports:
      - "${SETTLA_ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    environment:
      # CHANGE IN PRODUCTION: set these via settla/production/alertmanager in AWS Secrets Manager.
      # Production K8s: injected from alertmanager-secrets ExternalSecret.
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/placeholder}"
      PAGERDUTY_SERVICE_KEY: "${PAGERDUTY_SERVICE_KEY:-placeholder}"
      REMEDIATION_WEBHOOK_TOKEN: "${REMEDIATION_WEBHOOK_TOKEN:-dev-token}"
    networks:
      - settla-net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  grafana:
    image: grafana/grafana:10.4.1
    ports:
      - "${SETTLA_GRAFANA_PORT:-3002}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      # CHANGE IN PRODUCTION: set GRAFANA_ADMIN_PASSWORD to a strong random value.
      # Production K8s: injected from settla-app-secrets ExternalSecret (grafana-admin-password).
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - settla-net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Monitoring Exporters ───────────────────────────────────────────────

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-settla-dev}
    networks:
      - settla-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9121/metrics"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  postgres-exporter-ledger:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-ledger:5432/settla_ledger?sslmode=disable"
    networks:
      - settla-net
    depends_on:
      postgres-ledger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9187/metrics"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  postgres-exporter-transfer:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9188:9187"
    environment:
      DATA_SOURCE_NAME: "postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-transfer:5432/settla_transfer?sslmode=disable"
    networks:
      - settla-net
    depends_on:
      postgres-transfer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9187/metrics"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  postgres-exporter-treasury:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9189:9187"
    environment:
      DATA_SOURCE_NAME: "postgres://${POSTGRES_USER:-settla}:${POSTGRES_PASSWORD:-settla}@postgres-treasury:5432/settla_treasury?sslmode=disable"
    networks:
      - settla-net
    depends_on:
      postgres-treasury:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9187/metrics"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  pgbouncer-exporter-ledger:
    image: prometheuscommunity/pgbouncer-exporter:latest
    ports:
      - "9127:9127"
    environment:
      PGBOUNCER_EXPORTER_HOST: pgbouncer-ledger
      PGBOUNCER_EXPORTER_PORT: 6432
    networks:
      - settla-net
    depends_on:
      pgbouncer-ledger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9127/metrics"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  pgbouncer-exporter-transfer:
    image: prometheuscommunity/pgbouncer-exporter:latest
    ports:
      - "9128:9127"
    environment:
      PGBOUNCER_EXPORTER_HOST: pgbouncer-transfer
      PGBOUNCER_EXPORTER_PORT: 6432
    networks:
      - settla-net
    depends_on:
      pgbouncer-transfer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9127/metrics"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  pgbouncer-exporter-treasury:
    image: prometheuscommunity/pgbouncer-exporter:latest
    ports:
      - "9129:9127"
    environment:
      PGBOUNCER_EXPORTER_HOST: pgbouncer-treasury
      PGBOUNCER_EXPORTER_PORT: 6432
    networks:
      - settla-net
    depends_on:
      pgbouncer-treasury:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9127/metrics"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  node-exporter:
    image: prom/node-exporter:v1.7.0
    ports:
      - "9100:9100"
    networks:
      - settla-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/metrics"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Metabase (DB GUI) ────────────────────────────────────────────────
  metabase:
    image: metabase/metabase:v0.52.6
    ports:
      - "${SETTLA_METABASE_PORT:-3003}:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabasedata:/metabase-data
    networks:
      - settla-net
    depends_on:
      postgres-ledger:
        condition: service_healthy
      postgres-transfer:
        condition: service_healthy
      postgres-treasury:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

volumes:
  pgdata-ledger:
  pgdata-transfer:
  pgdata-treasury:
  tbdata:
  natsdata:
  redisdata:
  promdata:
  grafanadata:
  metabasedata:

networks:
  settla-net:
    driver: bridge
