# ============================================================================
# PostgreSQL tuning — treasury DB (position tracking, lowest volume)
# ============================================================================
# Tuned for: 580 TPS sustained, Apple Silicon MacBook, 3 GB container limit.
# Treasury is the smallest DB — position updates and balance snapshots.
# Volume is ~1/10 of transfer DB. Tuning is minimal.
# ============================================================================

# ── Network ────────────────────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 200

# ── Memory ─────────────────────────────────────────────────────────────────
shared_buffers = 768MB
effective_cache_size = 1536MB
work_mem = 8MB
maintenance_work_mem = 128MB

# ── WAL & Checkpointing ────────────────────────────────────────────────────
wal_buffers = 32MB
wal_compression = on
max_wal_size = 1GB
min_wal_size = 256MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min

synchronous_commit = on
full_page_writes = on

# ── Query Planner (SSD-optimized) ──────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ── Parallel Query ─────────────────────────────────────────────────────────
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4

# ── Autovacuum ─────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 60s

# ── Logging ────────────────────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000
log_checkpoints = on
log_line_prefix = '%t [%p]: [%l-1] db=%d,user=%u,app=%a,client=%h '

track_activities = on
track_counts = on
track_io_timing = on

idle_in_transaction_session_timeout = 60000
statement_timeout = 30000
