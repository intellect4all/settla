apiVersion: v1
kind: ConfigMap
metadata:
  name: settla-server-config
  labels:
    app.kubernetes.io/name: settla-server
    app.kubernetes.io/component: server
data:
  # gRPC & HTTP ports
  SETTLA_SERVER_HTTP_PORT: "8080"
  SETTLA_SERVER_GRPC_PORT: "9090"
  # Database URLs (via PgBouncer)
  # NOTE: Credentials should come from Secrets, not ConfigMaps.
  # These use placeholder hostnames that match the in-cluster service names.
  SETTLA_LEDGER_DB_URL: "postgres://settla:$(POSTGRES_LEDGER_PASSWORD)@pgbouncer-ledger:6432/settla_ledger?sslmode=require"
  SETTLA_TRANSFER_DB_URL: "postgres://settla:$(POSTGRES_TRANSFER_PASSWORD)@pgbouncer-transfer:6432/settla_transfer?sslmode=require"
  SETTLA_TREASURY_DB_URL: "postgres://settla:$(POSTGRES_TREASURY_PASSWORD)@pgbouncer-treasury:6432/settla_treasury?sslmode=require"

  # TigerBeetle
  SETTLA_TIGERBEETLE_ADDRESSES: "tigerbeetle:3001"

  # Redis
  SETTLA_REDIS_URL: "redis://:$(REDIS_PASSWORD)@redis:6379"

  # NATS
  SETTLA_NATS_URL: "nats://nats:4222"

  # High-throughput tuning
  SETTLA_TREASURY_FLUSH_INTERVAL_MS: "100"
  SETTLA_LEDGER_BATCH_WINDOW_MS: "10"
  SETTLA_LEDGER_BATCH_MAX_SIZE: "500"

  # Provider mode
  SETTLA_PROVIDER_MODE: "live"

  # Logging
  SETTLA_LOG_LEVEL: "info"
