apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: settla
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: settla
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: settla
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: alertmanager
      # Anti-affinity: spread alertmanager pods across nodes for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: alertmanager
                topologyKey: kubernetes.io/hostname
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--web.listen-address=:9093"
            - "--web.external-url=http://alertmanager.settla.svc.cluster.local:9093"
            # Cluster mode: HA pair deduplicates notifications
            - "--cluster.listen-address=0.0.0.0:9094"
            - "--cluster.peer=alertmanager-0.alertmanager-headless.settla.svc.cluster.local:9094"
            - "--cluster.peer=alertmanager-1.alertmanager-headless.settla.svc.cluster.local:9094"
          ports:
            - containerPort: 9093
              name: http
              protocol: TCP
            - containerPort: 9094
              name: mesh
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: templates
              mountPath: /etc/alertmanager/templates
              readOnly: true
            - name: data
              mountPath: /alertmanager
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          env:
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: alertmanager-secrets
                  key: slack-webhook-url
            - name: PAGERDUTY_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: alertmanager-secrets
                  key: pagerduty-service-key
            - name: REMEDIATION_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: alertmanager-secrets
                  key: remediation-webhook-token

        # Sidecar: auto-remediation webhook listener
        - name: remediation
          image: bitnami/kubectl:1.29
          command: ["/bin/bash", "/scripts/auto-remediation.sh"]
          ports:
            - containerPort: 9095
              name: remediation
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: remediation-scripts
              mountPath: /scripts
              readOnly: true
            - name: remediation-logs
              mountPath: /var/log/settla
          env:
            - name: SETTLA_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SETTLA_DRY_RUN
              value: "false"
          readinessProbe:
            tcpSocket:
              port: 9095
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: templates
          configMap:
            name: alertmanager-templates
            optional: true
        - name: data
          emptyDir: {}  # Use PVC in production for notification dedup state
        - name: remediation-scripts
          configMap:
            name: alertmanager-remediation
            defaultMode: 0755
        - name: remediation-logs
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager
  namespace: settla
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: settla
---
# RBAC: remediation sidecar needs permission to scale deployments,
# delete pods, and read configmaps in the settla namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alertmanager-remediation
  namespace: settla
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: settla
rules:
  # Read pods, deployments, statefulsets for status checks
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "patch", "update"]
  # Read/update configmaps for PgBouncer pool size changes
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "patch"]
  # Argo Rollouts (if installed)
  - apiGroups: ["argoproj.io"]
    resources: ["rollouts"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alertmanager-remediation
  namespace: settla
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: settla
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: alertmanager-remediation
subjects:
  - kind: ServiceAccount
    name: alertmanager
    namespace: settla
