                    $ref: '#/components/schemas/DepositSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/transactions/lookup:
    get:
      operationId: lookupTransaction
      summary: Look up a transaction
      description: Looks up a transaction by ID, external reference, or blockchain transaction hash. Exactly one of the query
        parameters must be provided (except `chain`, which is optional and paired with `tx_hash`).
      tags:
      - Verification
      parameters:
      - name: id
        in: query
        schema:
          type: string
          format: uuid
        description: Transaction ID.
      - name: reference
        in: query
        schema:
          type: string
        description: External reference or idempotency key.
      - name: tx_hash
        in: query
        schema:
          type: string
        description: Blockchain transaction hash.
      - name: chain
        in: query
        schema:
          type: string
        description: Blockchain network (used with tx_hash for disambiguation).
      responses:
        '200':
          description: Transaction found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                    - transfer
                    - deposit
                  transfer:
                    $ref: '#/components/schemas/Transfer'
                  deposit:
                    $ref: '#/components/schemas/DepositSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/analytics/transfers:
