# ClusterSecretStore — AWS Secrets Manager backend
#
# Prerequisites:
#   1. Install External Secrets Operator:
#        helm repo add external-secrets https://charts.external-secrets.io
#        helm install external-secrets external-secrets/external-secrets \
#          -n external-secrets-operator --create-namespace
#
#   2. Create an IAM role with the following policy and attach it to the
#      node group or use IRSA (IAM Roles for Service Accounts):
#
#        {
#          "Version": "2012-10-17",
#          "Statement": [{
#            "Effect": "Allow",
#            "Action": [
#              "secretsmanager:GetSecretValue",
#              "secretsmanager:DescribeSecret"
#            ],
#            "Resource": "arn:aws:secretsmanager:eu-west-1:*:secret:settla/*"
#          }]
#        }
#
#   3. For IRSA: annotate the external-secrets service account with the IAM
#      role ARN, or provide static credentials via the `auth.secretRef` below.
#
# AWS Secrets Manager paths used by this store:
#   settla/production/db            — Postgres/Patroni credentials
#   settla/production/app           — API keys, Tyk secret, wallet encryption key
#   settla/production/webhooks      — Per-tenant HMAC-SHA256 signing secrets
#   settla/production/alertmanager  — Slack webhook URL, PagerDuty key, remediation token
#   settla/production/backup        — Backup job credentials (Postgres password, notification URLs)
#
# For staging, change the `environment` label to `staging` and use paths:
#   settla/staging/db
#   settla/staging/app
#   settla/staging/webhooks
#   settla/staging/alertmanager
#   settla/staging/backup
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: settla-aws-secrets-manager
  labels:
    app.kubernetes.io/name: settla-secret-store
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: settla
    environment: production
spec:
  provider:
    aws:
      service: SecretsManager
      # Update to the region where your secrets live.
      region: eu-west-1
      auth:
        # Option A (recommended): IRSA — no static credentials needed.
        # Annotate the external-secrets controller service account with:
        #   eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/settla-external-secrets
        # Then remove the secretRef block below entirely.
        #
        # Option B: Static credentials stored in a K8s Secret.
        # Create the secret first:
        #   kubectl create secret generic aws-credentials \
        #     --from-literal=access-key-id=<ACCESS_KEY_ID> \
        #     --from-literal=secret-access-key=<SECRET_ACCESS_KEY> \
        #     -n external-secrets-operator
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            namespace: external-secrets-operator
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            namespace: external-secrets-operator
            key: secret-access-key
