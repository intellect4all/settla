# Production environment overrides
apiVersion: v1
kind: ConfigMap
metadata:
  name: settla-server-config
data:
  SETTLA_LOG_LEVEL: "warn"
  SETTLA_PROVIDER_MODE: "live"
  SETTLA_PPROF: "false"
  # Production: verify-full ensures certificate validation against CA
  SETTLA_LEDGER_DB_URL: "postgres://settla:$(POSTGRES_LEDGER_PASSWORD)@pgbouncer-ledger:6432/settla_ledger?sslmode=verify-full"
  SETTLA_TRANSFER_DB_URL: "postgres://settla:$(POSTGRES_TRANSFER_PASSWORD)@pgbouncer-transfer:6432/settla_transfer?sslmode=verify-full"
  SETTLA_TREASURY_DB_URL: "postgres://settla:$(POSTGRES_TREASURY_PASSWORD)@pgbouncer-treasury:6432/settla_treasury?sslmode=verify-full"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: settla-node-config
data:
  SETTLA_LOG_LEVEL: "warn"
  SETTLA_PROVIDER_MODE: "live"
  # Production: verify-full ensures certificate validation against CA
  SETTLA_LEDGER_DB_URL: "postgres://settla:$(POSTGRES_LEDGER_PASSWORD)@pgbouncer-ledger:6432/settla_ledger?sslmode=verify-full"
  SETTLA_TRANSFER_DB_URL: "postgres://settla:$(POSTGRES_TRANSFER_PASSWORD)@pgbouncer-transfer:6432/settla_transfer?sslmode=verify-full"
  SETTLA_TREASURY_DB_URL: "postgres://settla:$(POSTGRES_TREASURY_PASSWORD)@pgbouncer-treasury:6432/settla_treasury?sslmode=verify-full"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
data:
  SETTLA_LOG_LEVEL: "warn"
  SETTLA_GRPC_POOL_SIZE: "50"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-config
data:
  SETTLA_LOG_LEVEL: "warn"
