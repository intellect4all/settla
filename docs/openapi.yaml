  /v1/analytics/export:
    post:
      operationId: createExportJob
      summary: Create a data export
      description: Creates an asynchronous data export job. Once complete, the export can be downloaded via the `download_url`.
      tags:
      - Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - export_type
              properties:
                export_type:
                  type: string
                  enum:
                  - transfers
                  - fees
                  - deposits
                  - reconciliation
                  description: Type of data to export.
                  example: transfers
                period:
                  type: string
                  enum:
                  - 7d
                  - 30d
                  - 90d
                  - all
                  description: Period for the export. Defaults to 30d.
                  example: 30d
                format:
                  type: string
                  enum:
                  - csv
                  - json
                  description: Export file format. Defaults to csv.
                  example: csv
      responses:
        '201':
          description: Export job created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    example: e1f2a3b4-c5d6-7890-1234-567890abcdef
                  status:
                    type: string
                    enum:
                    - pending
                    - processing
                    - completed
                    - failed
                    example: pending
                  download_url:
                    type: string
                    format: uri
                    description: URL to download the export. Available once status is completed.
                    example: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/analytics/export/{jobId}:
    get:
      operationId: getExportJob
