# ============================================================================
# PostgreSQL tuning — ledger DB (double-entry audit records)
# ============================================================================
# Tuned for: 580 TPS sustained, Apple Silicon MacBook, 5 GB container limit.
# The ledger DB stores audit records written by settla-node via the outbox
# pattern after TigerBeetle commits. Moderate write + heavy read workload.
# ============================================================================

# ── Network ────────────────────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 400

# ── Memory ─────────────────────────────────────────────────────────────────
shared_buffers = 1280MB
effective_cache_size = 3GB
work_mem = 16MB
maintenance_work_mem = 256MB

# ── WAL & Checkpointing ────────────────────────────────────────────────────
wal_buffers = 64MB
wal_compression = on
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min

synchronous_commit = on
full_page_writes = on
wal_writer_delay = 200ms

# ── Query Planner (SSD-optimized) ──────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ── Parallel Query ─────────────────────────────────────────────────────────
max_worker_processes = 6
max_parallel_workers_per_gather = 2
max_parallel_workers = 6
max_parallel_maintenance_workers = 2

# ── Autovacuum ─────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_limit = 2000

# ── Logging ────────────────────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 10MB
log_line_prefix = '%t [%p]: [%l-1] db=%d,user=%u,app=%a,client=%h '

# ── Statistics ─────────────────────────────────────────────────────────────
track_activities = on
track_counts = on
track_io_timing = on

idle_in_transaction_session_timeout = 60000
statement_timeout = 30000
