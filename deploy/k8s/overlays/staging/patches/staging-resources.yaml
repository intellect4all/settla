# Moderate resources for staging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: settla-server
spec:
  template:
    spec:
      containers:
        - name: settla-server
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: settla-node
spec:
  template:
    spec:
      containers:
        - name: settla-node
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  template:
    spec:
      containers:
        - name: gateway
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
