# ============================================================================
# PostgreSQL Client Authentication — pg_hba.conf
# ============================================================================
# Allows connections from:
#   - localhost (for admin via docker exec)
#   - LAN subnet (k3s cluster nodes and other MacBook)
#
# NOTE: Adjust the LAN subnet below to match your actual network.
# Default 192.168.0.0/16 covers most home networks.
# ============================================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local unix socket (for docker exec admin access)
local   all             all                                     trust

# Localhost TCP
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Docker bridge network (for health checks, internal service-to-service)
host    all             all             172.16.0.0/12           scram-sha-256

# LAN — k3s cluster nodes and other MacBook
# Adjust this subnet to match your actual home LAN.
host    all             all             192.168.0.0/16          scram-sha-256
host    all             all             10.0.0.0/8              scram-sha-256

# Replication
host    replication     all             192.168.0.0/16          scram-sha-256

# Reject everything else
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject
