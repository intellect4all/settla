# Headless Service for gateway pods.
# Returns individual pod IPs instead of a virtual IP, enabling the
# consistent-hash router (gateway-router) to resolve and route to
# specific pods by tenant affinity.
apiVersion: v1
kind: Service
metadata:
  name: gateway-headless
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  clusterIP: None  # Headless — DNS returns pod IPs directly
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
