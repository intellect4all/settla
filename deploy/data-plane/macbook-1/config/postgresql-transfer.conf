# ============================================================================
# PostgreSQL tuning — transfer DB (hottest write path)
# ============================================================================
# Tuned for: 580 TPS sustained, Apple Silicon MacBook, 8 GB container limit.
# This is the highest-volume database in Settla — transfer records, idempotency
# keys, outbox entries. Sized for aggressive write throughput.
# ============================================================================

# ── Network ────────────────────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 400

# ── Memory ─────────────────────────────────────────────────────────────────
# shared_buffers: 25% of container memory (2 GB of 8 GB)
shared_buffers = 2GB
# effective_cache_size: 50% of container memory
effective_cache_size = 4GB
work_mem = 32MB
maintenance_work_mem = 512MB

# ── WAL & Checkpointing ────────────────────────────────────────────────────
# Tuned for high write throughput with bounded checkpoint spikes.
wal_buffers = 64MB
wal_compression = on
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min

# ── Write Optimization ─────────────────────────────────────────────────────
# synchronous_commit = on is the safe default. Set to 'off' ONLY if you can
# tolerate losing the last few milliseconds of commits on crash — this gives
# a ~20% throughput boost. For a demo at 580 TPS, leave 'on'.
synchronous_commit = on
full_page_writes = on
wal_writer_delay = 200ms
commit_delay = 0

# ── Query Planner (SSD-optimized) ──────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ── Parallel Query ─────────────────────────────────────────────────────────
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_workers = 8
max_parallel_maintenance_workers = 2

# ── Autovacuum (aggressive for high-churn tables) ──────────────────────────
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_limit = 2000

# ── Logging ────────────────────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 10MB
log_autovacuum_min_duration = 5000
log_line_prefix = '%t [%p]: [%l-1] db=%d,user=%u,app=%a,client=%h '

# ── Statistics ─────────────────────────────────────────────────────────────
track_activities = on
track_counts = on
track_io_timing = on
track_functions = pl

# ── Connection Pooling Support ─────────────────────────────────────────────
# PgBouncer in the cluster handles connection pooling. Keep pg-level pooling off.
idle_in_transaction_session_timeout = 60000
statement_timeout = 30000
